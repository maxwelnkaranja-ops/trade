    el('differ-abortonloss').onclick = () => eng.dispatch({ type: 'TOGGLE_ABORT_ON_LOSS' });
    el('differ-auto').onclick = () => { eng.dispatch({ type: 'TOGGLE_AUTO' }); renderCenterConfig(eng.state); };
    el('differ-tp') && (el('differ-tp').onchange = (e) => eng.dispatch({ type: 'SET_TP', value: Math.max(0, parseFloat(e.target.value) || 0) }));
    el('differ-sl') && (el('differ-sl').onchange = (e) => eng.dispatch({ type: 'SET_SL', value: Math.max(0, parseFloat(e.target.value) || 0) }));
    el('differ-autobatch') && (el('differ-autobatch').onchange = (e) => eng.dispatch({ type: 'SET_AUTO_BATCH', value: Math.max(1, parseInt(e.target.value) || 1) }));
    el('differ-engage').onclick = () => s.isArmed ? eng.disarmSystem() : eng.armSystem();
    el('differ-abort').onclick = () => { eng.abortTrades(); eng.disarmSystem(); };
  }

  function renderRight(s, tab) {
    if (tab === 'lab') {
      el('differ-right').innerHTML = `<div class="section-divider neon-text-accent">🧪 Experiment Lab</div>
        <div class="glass-panel" style="padding:12px"><p style="font-size:11px;color:hsl(var(--muted-foreground))">Start a timed experiment from the original Lab tab. Net P/L chart uses ${s.plHistory.length} data points.</p>
        <div style="display:flex;gap:6px;margin-top:8px">${[15, 30, 60].map((d) => `<button class="glass-monitor" style="flex:1;padding:8px;cursor:pointer" data-exp="${d}">${d}m</button>`).join('')}</div>
        <button id="differ-stop-exp" style="margin-top:8px;width:100%;padding:8px;cursor:pointer">Stop Experiment</button></div>`;
      el('differ-right').querySelectorAll('[data-exp]').forEach((b) => b.onclick = () => global.benzEngine.dispatch({ type: 'START_EXPERIMENT', durationMinutes: parseInt(b.dataset.exp) }));
      el('differ-stop-exp').onclick = () => global.benzEngine.dispatch({ type: 'STOP_EXPERIMENT' });
      return;
    }
    const total = s.totalWins + s.totalLoss;
    const wr = total ? ((s.totalWins / total) * 100).toFixed(1) : '0.0';
    const rightHtml = `
      <div style="text-align:center;padding:12px" class="glass-panel-glow">
        <div style="font-size:10px;letter-spacing:3px">NET PROFIT</div>
        <div class="stat-5xl ${s.totalProfit >= 0 ? 'neon-text-win' : 'neon-text-loss'}" style="font-size:2.5rem">${s.totalProfit >= 0 ? '+' : ''}${s.totalProfit.toFixed(2)}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px;font-size:12px">
          <div class="glass-monitor" style="padding:8px"><div class="neon-text-win font-mono-data">${s.totalWins}</div>WINS</div>
          <div class="glass-monitor" style="padding:8px"><div class="neon-text-loss font-mono-data">${s.totalLoss}</div>LOSSES</div>
          <div class="glass-monitor" style="padding:8px"><div class="font-mono-data">${wr}%</div>WIN RATE</div>
        </div>
      </div>
      <div style="margin-top:8px" class="journal-list">${s.journal.slice(0, 60).map((j) => `<div class="journal-entry ${j.type}">
        <span class="journal-badge ${j.type}">${j.type === 'win' ? 'W' : 'L'}</span>
        <span style="color:hsl(var(--muted-foreground))">${j.time}</span>
        <span class="journal-digits">B:${j.barrier} <b>${j.entryDigit ?? '—'}</b><span class="arrow">→</span><b>${j.exitDigit}</b></span>
        <span class="journal-net ${j.type === 'win' ? 'neon-text-win' : 'neon-text-loss'}">${j.profit >= 0 ? '+' : ''}${j.profit.toFixed(2)}</span>
      </div>`).join('') || '<div style="text-align:center;padding:30px;opacity:0.4;font-size:11px;letter-spacing:3px">NO TRADES RECORDED</div>'}</div>
      <button id="differ-reset" style="width:100%;margin-top:8px;padding:10px;border:1px solid hsl(var(--border));border-radius:10px;background:transparent;color:hsl(var(--muted-foreground));cursor:pointer;font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:3px">RESET JOURNAL</button>`;
    if (setHtmlIfChanged(el('differ-right'), rightHtml)) {
      el('differ-reset').onclick = () => global.benzEngine.dispatch({ type: 'RESET_JOURNAL' });
    }
  }

  function updateStatusBar(s) {
    const bar = el('differ-statusbar');
    if (!bar) return;
    const txt = s.isCooldown ? `⏳ COOLDOWN ${s.cooldownRemaining}s — Re-analyzing...` : s.isRunning ? `⚡ FIRING BATCH...` : s.isArmed ? `🔋 ARMED — Silence: ${s.silenceCount}/${s.silenceTrigger}` : s.isAuthenticated ? '✓ READY — Press ENGAGE' : 'OFFLINE — Add API Token in Settings';
    bar.textContent = txt;
    bar.className = 'glass-monitor ' + (s.isCooldown ? 'neon-text-accent' : s.isRunning ? 'neon-text-win' : s.isArmed ? 'neon-text-primary' : '');
    bar.style.cssText = 'text-align:center;padding:10px;font-family:monospace;font-size:13px;border-top:1px solid hsl(var(--border)/0.5)';

    const tick = el('differ-live-tick');
    if (tick) tick.textContent = s.currentTick ?? '—';
    const cold = el('differ-live-cold');
    if (cold) cold.textContent = s.coldDigit ?? '—';

    const bal = el('differ-balance');
    if (bal && s.isAuthenticated) {
      bal.style.display = 'block';
      bal.innerHTML = `USD <span class="neon-text-win font-mono-data">${s.balanceUSD.toFixed(2)}</span> · KSH <span class="neon-text-accent font-mono-data">${(s.balanceUSD * 129.5).toFixed(2)}</span>`;
    }
    const dot = el('differ-conn-dot');
    if (dot) dot.style.background = s.connectionStatus === 'connected' ? 'hsl(var(--win))' : s.connectionStatus === 'connecting' ? 'hsl(var(--accent))' : 'hsl(var(--loss)/0.5)';

    const engage = el('differ-engage');
    if (engage) {
      engage.className = 'btn-engage ' + (s.isCooldown ? 'cooldown' : s.isRunning ? 'firing' : s.isArmed ? 'armed' : '');
      engage.textContent = s.isCooldown ? `⏳ COOLDOWN ${s.cooldownRemaining}s` : s.isRunning ? '⚡ FIRING...' : s.isArmed ? '🔋 BOLT ARMED' : 'ENGAGE ATOMIC BOLT';
    }
    const abort = el('differ-abort');
    if (abort) abort.style.display = s.isArmed || s.isRunning ? 'block' : 'none';
  }

  let lastTab = 'journal';
  global.BenzUI = {
    render(s) {
      const root = el('differ-root');
      if (!root) return;
      buildShell(root);
      renderLeft(s);
      updateStatusBar(s);
      const activeSub = document.querySelector('#panel-differ .differ-subtab.active');
      lastTab = activeSub ? activeSub.dataset.tab : lastTab;
      renderRight(s, lastTab);
    },
    renderFull(s) {
      shellBuilt = false;
      this.render(s);
      renderCenterConfig(s);
    },
  };
})(window);
</script>
<script>
(function(){
  'use strict';
  if(window.HubStore) document.documentElement.className=window.HubStore.getState().theme||'dark';
  
  if(!window.BenzEngine){console.error('BenzEngine not loaded');return;}
  const eng=new window.BenzEngine();
  window.benzEngine=eng;
  eng.onUpdate=function(s){if(window.BenzUI)window.BenzUI.render(s);};
  if(window.BenzUI)window.BenzUI.renderFull(eng.state);
  window._differEngine=eng;

})();
</script>
<script>
  (function() {
    const THEMES = [
      { v: 'luminous', i: '💎', label: 'Luminous' },
      { v: 'void',     i: '⬛', label: 'Void'     },
      { v: 'dark',     i: '🟣', label: 'Obsidian' },
      { v: 'midnight', i: '🔵', label: 'Midnight'  },
      { v: 'slate',    i: '🌌', label: 'Nebula'   },
      { v: 'charcoal', i: '🩶', label: 'Charcoal' },
      { v: 'light',    i: '⚪', label: 'Arctic'   },
    ];
    function renderThemePills(container, cb) {
      if (!container) return;
      container.innerHTML = THEMES.map(t =>
        `<button class="theme-pill-btn" data-tv="${t.v}" title="${t.label}">${t.i}</button>`
      ).join('');
      container.querySelectorAll('.theme-pill-btn').forEach(b => b.onclick = () => cb(b.dataset.tv));
    }
    function refreshPills() {
      const s = window.HubStore ? window.HubStore.getState() : {};
      document.querySelectorAll('.theme-pill-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tv === s.theme));
    }
    function applyTheme() {
      const s = window.HubStore ? window.HubStore.getState() : {};
      document.documentElement.className = s.theme || 'dark';
    }
    if (window.HubStore) {
      window.HubStore.subscribe(() => { applyTheme(); refreshPills(); refreshTopbar(); });
      applyTheme();
    }
    renderThemePills(document.getElementById('hub-theme-pills'), v => window.HubStore && window.HubStore.setTheme(v));
    renderThemePills(document.getElementById('settings-theme-pills'), v => window.HubStore && window.HubStore.setTheme(v));
    refreshPills();
    const modal = document.getElementById('settings-modal');
    const settingsBtn = document.getElementById('hub-settings-btn');
    const closeBtn = document.getElementById('settings-close');
    if (settingsBtn) settingsBtn.onclick = () => modal && modal.setAttribute('aria-hidden','false');
    if (closeBtn) closeBtn.onclick = () => modal && modal.setAttribute('aria-hidden','true');
    if (modal) modal.onclick = e => { if (e.target === modal) modal.setAttribute('aria-hidden','true'); };
    const appIdInput = document.getElementById('settings-appid');
    const appIdSaveBtn = document.getElementById('settings-appid-save');
    if (appIdSaveBtn) appIdSaveBtn.onclick = () => {
      const v = (appIdInput && appIdInput.value || '').trim();
      if (window.HubStore) window.HubStore.setAppId(v);
      appIdSaveBtn.textContent = 'Saved ✓'; setTimeout(() => appIdSaveBtn.textContent = 'Save', 2000);
    };
    if (window.HubStore && appIdInput) { const s=window.HubStore.getState(); if(s.appId) appIdInput.value=s.appId; }
    const wsInput = document.getElementById('settings-wsappid');
    const wsSaveBtn = document.getElementById('settings-wsappid-save');
    if (wsSaveBtn) wsSaveBtn.onclick = () => {
      const v = (wsInput && wsInput.value || '').trim();
      if (window.HubStore) window.HubStore.setWsAppId(v);
      wsSaveBtn.textContent = 'Saved ✓'; setTimeout(() => wsSaveBtn.textContent = 'Save', 2000);
    };
    const tokenInput = document.getElementById('settings-token');
    const statusEl = document.getElementById('settings-status');
    const saveBtn = document.getElementById('settings-save');
    function refreshAuthStatus() {
      const hub = window.HubStore ? window.HubStore.getState() : {};
      if (tokenInput && hub.apiToken) tokenInput.value = hub.apiToken;
      if (statusEl) statusEl.textContent = hub.connectionStatus === 'connected'
        ? `✓ Connected${hub.accountId ? ' — ' + hub.accountId : ''}`
        : hub.connectionStatus === 'connecting' ? '⏳ Connecting…'
        : hub.apiToken ? `✗ ${hub.connectionError || 'Not connected'}` : 'No token set';
    }
    if (saveBtn) saveBtn.onclick = () => {
      const v = (tokenInput && tokenInput.value || '').trim();
      if (v && window.HubStore) window.HubStore.setToken(v);
    };
    refreshAuthStatus();
    if (window.HubStore) window.HubStore.subscribe(refreshAuthStatus);
    const accTypeBtn = document.getElementById('settings-account-type');
    if (accTypeBtn) accTypeBtn.onclick = () => {
      const hub = window.HubStore.getState();
      window.HubStore.setAccountType(hub.accountType === 'real' ? 'demo' : 'real');
    };
    ['settings-tg-token','settings-tg-chat'].forEach(id => {
      const node = document.getElementById(id);
      if (node && window.HubStore) node.onchange = () =>
        window.HubStore.setTelegram(
          document.getElementById('settings-tg-token').value.trim(),
          document.getElementById('settings-tg-chat').value.trim()
        );
    });
    const tgToggle = document.getElementById('settings-tg-toggle');
    if (tgToggle) tgToggle.onclick = () =>
      window.HubStore.setTelegramEnabled(!window.HubStore.getState().telegramEnabled);
    const muteToggleBtn = document.getElementById('settings-mute-toggle');
    const muteIcon = document.getElementById('mute-icon');
    const muteLabel = document.getElementById('mute-label');
    const _muteChannel = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('benz_club_mute') : null;
    function applyMuteState(muted) {
      document.querySelectorAll('audio,video').forEach(el => el.muted = muted);
      if (window.Sounds && window.Sounds.soundEngine) window.Sounds.soundEngine.toggle(!muted);
      try { localStorage.setItem('benz_muted', muted ? '1' : '0'); } catch(_) {}
      if (muteToggleBtn) muteToggleBtn.classList.toggle('on', muted);
      if (muteIcon) muteIcon.textContent = muted ? '🔇' : '🔊';
      if (muteLabel) muteLabel.textContent = muted ? 'Muted' : 'Sound On';
      window._benzMuted = muted;
    }
    if (_muteChannel) _muteChannel.onmessage = e => { if (typeof e.data?.muted === 'boolean') applyMuteState(e.data.muted); };
    (function initMute() {
      let saved = false;
      try { saved = localStorage.getItem('benz_muted') === '1'; } catch(_) {}
      applyMuteState(saved);
    })();
    if (muteToggleBtn) muteToggleBtn.onclick = () => {
      const nowMuted = !window._benzMuted;
      applyMuteState(nowMuted);
      if (_muteChannel) _muteChannel.postMessage({ muted: nowMuted });
    };
    function refreshTopbar() {
      const hub = window.HubStore ? window.HubStore.getState() : {};
      const idEl = document.getElementById('hub-account-id');
      if (idEl) idEl.textContent = hub.accountId ? `${hub.accountType === 'real' ? 'REAL' : 'DEMO'} · ${hub.accountId}` : 'No account linked';
      const balPill = document.getElementById('hub-balance-pill');
      if (balPill) {
        if (hub.isAuthenticated) { balPill.style.display = ''; balPill.textContent = `${hub.currency || 'USD'} ${hub.balanceUSD.toFixed(2)}`; }
        else balPill.style.display = 'none';
      }
    }
    refreshTopbar();
    const sidebar = document.getElementById('hub-sidebar');
    const collapseBtn = document.getElementById('hub-sidebar-collapse');
    if (sidebar && collapseBtn) {
      let collapsed = false;
      try { collapsed = localStorage.getItem('hub_sidebar_collapsed') === '1'; } catch(e) {}
      sidebar.classList.toggle('collapsed', collapsed);
      collapseBtn.addEventListener('click', () => {
        collapsed = !collapsed;
        sidebar.classList.toggle('collapsed', collapsed);
        try { localStorage.setItem('hub_sidebar_collapsed', collapsed ? '1' : '0'); } catch(e) {}
      });
    }
    setInterval(() => { const c = document.getElementById('hub-clock'); if (c) c.textContent = new Date().toLocaleTimeString('en-US',{hour12:false}); }, 1000);
  })();
</script>
</body>
</html>
