/* ── BUTTONS — PREMIUM ── */
.btn-primary {
  border-radius: 10px !important;
  font-size: 11px !important;
  letter-spacing: 0.5px !important;
  box-shadow: 0 0 20px hsl(var(--primary)/0.25), inset 0 1px 0 hsl(0 0% 100% / 0.15) !important;
}
.btn-primary:hover {
  transform: translateY(-2px) !important;
  box-shadow: 0 0 40px hsl(var(--primary)/0.4) !important;
}

/* ── TOGGLE SWITCHES — PREMIUM ── */
.toggle {
  position: relative;
  width: 42px !important;
  height: 24px !important;
  border-radius: 999px !important;
  background: hsl(var(--muted)) !important;
  border: 1px solid hsl(var(--border)) !important;
  cursor: pointer;
  transition: all 0.25s var(--ease) !important;
  outline: none;
}
.toggle.on {
  background: linear-gradient(135deg, hsl(var(--primary)), hsl(var(--primary-2))) !important;
  border-color: hsl(var(--primary)/0.5) !important;
  box-shadow: 0 0 16px hsl(var(--primary)/0.35) !important;
}

/* ── LIVE BADGE — NEON GLOW ── */
.hub-live-badge {
  border-radius: 999px !important;
  font-size: 9px !important;
  letter-spacing: 2px !important;
  transition: all 0.3s var(--ease) !important;
}
.hub-live-badge.connected {
  box-shadow: 0 0 20px hsl(var(--win)/0.2), 0 0 0 1px hsl(var(--win)/0.25) !important;
}

/* ── BOT TOGGLE CHIPS — UPGRADE ── */
.bot-toggle-chip {
  border-radius: 999px !important;
  padding: 5px 12px 5px 8px !important;
  font-size: 10.5px !important;
  transition: all 0.2s var(--ease) !important;
}
.bot-toggle-chip.on {
  box-shadow: 0 0 12px hsl(var(--win)/0.2) !important;
}

/* ── DASH BODY LAYOUT ── */
.dash-body {
  grid-template-columns: 1fr 320px !important;
  gap: 14px !important;
}

/* ── GLASS MONITOR (digit pads) ── */
.glass-monitor {
  border-radius: 12px !important;
}

/* ── INPUT FIELDS — PREMIUM ── */
.input-field, .titan-input, .terminal-input, .terminal-select {
  border-radius: 10px !important;
  background: hsl(var(--bg)) !important;
  transition: all 0.2s var(--ease) !important;
}
.input-field:focus, .titan-input:focus {
  box-shadow: 0 0 0 3px hsl(var(--primary)/0.15), 0 0 20px hsl(var(--primary)/0.08) !important;
}

/* ── DASH MASTER TP/SL inputs — enhanced ── */
#dash-master-tp {
  border-radius: 10px !important;
  transition: box-shadow 0.2s !important;
}
#dash-master-tp:focus {
  box-shadow: 0 0 0 3px hsl(var(--win)/0.2), 0 0 16px hsl(var(--win)/0.15) !important;
}
#dash-master-sl {
  border-radius: 10px !important;
  transition: box-shadow 0.2s !important;
}
#dash-master-sl:focus {
  box-shadow: 0 0 0 3px hsl(var(--loss)/0.2), 0 0 16px hsl(var(--loss)/0.15) !important;
}

/* ── SCROLLBARS — CUSTOM ── */
*::-webkit-scrollbar { width: 4px; height: 4px; }
*::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, hsl(var(--primary)/0.3), hsl(var(--secondary)/0.2)) !important;
  border-radius: 4px !important;
}
*::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, hsl(var(--primary)/0.5), hsl(var(--secondary)/0.4)) !important;
}

/* ── BALANCE PILL — PREMIUM ── */
.hub-balance-pill {
  border-radius: 999px !important;
  animation: glow-pulse-blue 3s ease-in-out infinite;
}

/* ── ENGINE OVERVIEW SECTION ── */
.rank-table {
  display: grid !important;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)) !important;
  gap: 10px !important;
}

/* ── JOURNAL TABS ROW ── */
.journal-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
}

/* ── EXEC LIST ITEMS ANIMATION ── */
.exec-list > * {
  animation: slide-in-up 0.3s var(--ease) both;
}
.exec-list > *:nth-child(1) { animation-delay: 0.05s; }
.exec-list > *:nth-child(2) { animation-delay: 0.10s; }
.exec-list > *:nth-child(3) { animation-delay: 0.15s; }
.exec-list > *:nth-child(4) { animation-delay: 0.20s; }

/* ── RESPONSIVE TWEAKS ── */
@media (max-width: 1100px) {
  .dash-body { grid-template-columns: 1fr !important; }
  .dash-stats-row { grid-template-columns: repeat(2, 1fr) !important; }
}
@media (max-width: 640px) {
  .dash-scroll { padding: 12px 14px !important; }
  .stat-card-value { font-size: 1.4rem !important; }
}

/* ── PARTICLES (CSS only, positioned via nth-child tricks) ── */
.hub-shell > aside::before {
  content: '';
  position: absolute;
  bottom: 20%; left: 30%;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: hsl(var(--primary)/0.6);
  box-shadow: 0 0 6px hsl(var(--primary)/0.8);
  animation: float-particle 5s ease-in-out infinite;
}
.hub-shell > aside .hub-tabs::before {
  content: '';
  position: absolute;
  bottom: 40%; left: 60%;
  width: 1.5px; height: 1.5px;
  border-radius: 50%;
  background: hsl(var(--secondary)/0.5);
  box-shadow: 0 0 5px hsl(var(--secondary)/0.8);
  animation: float-particle 7s 1.5s ease-in-out infinite;
  pointer-events: none;
}

/* ── GLASS CARD GLOW — UPGRADE ── */
.glass-card-glow {
  border-radius: 16px !important;
}

/* ── ACTIVE TAB INDICATOR — static glow, no flicker ── */
.hub-tab .dot.live {
  animation: none !important;
  box-shadow: 0 0 6px hsl(var(--win)), 0 0 12px hsl(var(--win)/0.3) !important;
}

/* ── DASHBOARD OVERALL: STAGGER ENTRANCE ── */
.dash-stats-row .stat-card { animation: stat-rise 0.5s cubic-bezier(0.16,1,0.3,1) both; }
.dash-stats-row .stat-card:nth-child(1) { animation-delay: 0.0s; }
.dash-stats-row .stat-card:nth-child(2) { animation-delay: 0.08s; }
.dash-stats-row .stat-card:nth-child(3) { animation-delay: 0.16s; }
.dash-stats-row .stat-card:nth-child(4) { animation-delay: 0.24s; }

/* ══════════════════════════════════════════════════════════════════
   BENZ CLUB — ULTRA DARK PRO v7  "ABYSS"
   Obsidian void surfaces · deep chromatic glows · cinematic depth
   Premium terminal aesthetic — darker than dark, sharper than sharp
   ══════════════════════════════════════════════════════════════════ */

/* ── DEEPER BLACK ROOT OVERRIDES ── */
:root, .dark {
  --bg:         0 0% 0% !important;
  --bg-soft:    240 8% 2.2% !important;
  --card:       240 6% 4.5% !important;
  --card-2:     240 6% 7% !important;
  --border:     240 6% 9% !important;
  --border-bright: 240 6% 16% !important;
  --muted:      240 5% 7% !important;
  --muted-foreground: 240 4% 42% !important;
  --foreground: 220 18% 94% !important;

  /* Richer accent palette */
  --primary:    232 95% 64% !important;
  --primary-2:  258 88% 60% !important;
  --secondary:  195 100% 54% !important;
  --accent:     232 95% 64% !important;
  --win:        155 72% 46% !important;
  --loss:       350 84% 58% !important;

  /* Stronger shadows for deeper depth */
  --shadow-sm:  0 1px 4px hsl(0 0% 0% / 0.8) !important;
  --shadow-md:  0 8px 32px hsl(0 0% 0% / 0.85), 0 2px 8px hsl(0 0% 0% / 0.6) !important;
  --shadow-lg:  0 24px 64px hsl(0 0% 0% / 0.9), 0 6px 20px hsl(0 0% 0% / 0.7) !important;
  --glow-gold:  0 0 0 1px hsl(var(--primary) / .2), 0 8px 32px hsl(var(--primary) / .15) !important;
  --glow-win:   0 0 20px hsl(var(--win) / .4) !important;
  --glow-loss:  0 0 20px hsl(var(--loss) / .4) !important;
}

/* ── NEW KEYFRAMES (ultra dark edition) ── */
@keyframes aurora-shift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes void-breathe {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50%       { opacity: 0.7; transform: scale(1.05); }
}
@keyframes neon-border-pulse {
  0%, 100% { box-shadow: 0 0 0 1px hsl(var(--primary)/0.15) inset, 0 0 20px hsl(var(--primary)/0.05); }
  50%       { box-shadow: 0 0 0 1px hsl(var(--primary)/0.35) inset, 0 0 40px hsl(var(--primary)/0.12); }
}
@keyframes data-flash {
  0%   { color: hsl(var(--win)); text-shadow: 0 0 20px hsl(var(--win)/0.8); }
  100% { color: inherit; text-shadow: none; }
}
@keyframes corner-glow {
  0%, 100% { opacity: 0.3; }
  50%       { opacity: 0.8; }
}
@keyframes status-flicker {
  0%, 96%, 100% { opacity: 1; }
  97%           { opacity: 0.6; }
  98%           { opacity: 1; }
  99%           { opacity: 0.7; }
}
@keyframes deep-pulse {
  0%, 100% { box-shadow: 0 0 30px hsl(var(--primary)/0.15), 0 0 80px hsl(var(--primary)/0.04); }
  50%       { box-shadow: 0 0 60px hsl(var(--primary)/0.3),  0 0 120px hsl(var(--primary)/0.08); }
}
@keyframes card-ambient {
  0%, 100% { background-position: 0% 0%; }
  50%       { background-position: 100% 100%; }
}
@keyframes orb-drift {
  0%   { transform: translate(0, 0) scale(1); }
  33%  { transform: translate(30px, -20px) scale(1.08); }
  66%  { transform: translate(-20px, 15px) scale(0.96); }
  100% { transform: translate(0, 0) scale(1); }
}
@keyframes terminal-cursor {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}
@keyframes stat-value-in {
  from { opacity: 0; transform: translateY(8px) scale(0.94); filter: blur(6px); }
  to   { opacity: 1; transform: translateY(0) scale(1);    filter: blur(0); }
}
@keyframes bot-card-glow {
  0%, 100% { box-shadow: 0 4px 20px hsl(0 0% 0% / 0.6), 0 0 0 1px hsl(var(--border)); }
  50%       { box-shadow: 0 8px 40px hsl(0 0% 0% / 0.8), 0 0 0 1px hsl(var(--primary)/0.12); }
}

/* ── ULTRA DARK BODY + AMBIENT ORBS ── */
html, body {
  background: #000 !important;
}
body {
  background: #000000 !important;
}

/* Deep ambient orbs — the soul of the aesthetic */
.hub-shell::before {
  background:
    radial-gradient(ellipse 50% 35% at 5% 0%,   hsl(232 95% 64% / 0.10) 0%, transparent 60%),
    radial-gradient(ellipse 35% 25% at 95% 8%,  hsl(195 100% 54% / 0.07) 0%, transparent 55%),
    radial-gradient(ellipse 45% 30% at 50% 105%, hsl(258 88% 60% / 0.08) 0%, transparent 55%),
    radial-gradient(ellipse 30% 20% at 80% 90%,  hsl(155 72% 46% / 0.05) 0%, transparent 50%)
    !important;
  animation: void-breathe 12s ease-in-out infinite !important;
}

/* ── ABSOLUTE BLACK BODY GRID — subtle, not overpowering ── */
body::before {
  background-image:
    linear-gradient(hsl(240 6% 14% / 0.035) 1px, transparent 1px),
    linear-gradient(90deg, hsl(240 6% 14% / 0.035) 1px, transparent 1px) !important;
  background-size: 48px 48px !important;
  animation: bg-grid-shift 12s linear infinite, grid-pulse 6s ease-in-out infinite !important;
}

/* ── SIDEBAR — ABYSS EDITION ── */
.hub-sidebar {
  background: linear-gradient(180deg,
    hsl(240 8% 2.5% / 0.99) 0%,

  border-right: 1px solid hsl(240 6% 9%) !important;
  box-shadow:
    1px 0 0 hsl(240 6% 12%),
    6px 0 60px hsl(0 0% 0% / 0.7) !important;
}
.hub-sidebar::after {
  background: linear-gradient(180deg,
    transparent 0%,

/* ── BRAND — PREMIUM CRYSTAL LOGO ── */
.hub-brand-avatar {

    hsl(258 88% 60%),
    hsl(195 100% 54%)) !important;

  box-shadow:
    0 0 0 1px hsl(232 95% 64% / 0.5),
    0 0 30px hsl(232 95% 64% / 0.4),

.hub-brand-name {

    hsl(220 18% 94%),

  -webkit-text-fill-color: transparent !important;
  background-clip: text !important;

.hub-tab {

}
.hub-tab:hover:not(.active) {

.hub-nav-label {
  color: hsl(240 4% 28%) !important;

}

/* ── TOPBAR — VOID BLACK ── */
.hub-header {

}
.hub-header::after {

.hub-clock {

.hub-breadcrumb { color: hsl(240 4% 35%) !important; }

/* ── LIVE BADGE — NEON SIGNAL ── */
.hub-live-badge {

.hub-live-badge.connected {

  border-color: hsl(155 72% 46% / 0.22) !important;

/* ── SETTINGS BUTTON — VOID GLASS ── */
.hub-settings-btn {
  background: hsl(240 8% 3.5%) !important;
  border: 1px solid hsl(240 6% 10%) !important;

}
.hub-settings-btn:hover {
  background: hsl(240 6% 6%) !important;

}

/* ── DASHBOARD SCROLL ── */
.dash-scroll {
  background: #000 !important;
  padding: 14px 16px !important;
  gap: 14px !important;
  overflow-y: auto !important;
}

/* ── HERO — CINEMATIC ── */
.dash-hero-title {
  font-size: 2.5rem !important;
  font-weight: 900 !important;
  background: linear-gradient(135deg,
    hsl(220 18% 96%) 0%,
    hsl(232 95% 76%) 45%,
    hsl(195 100% 66%) 100%) !important;
  -webkit-background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  background-clip: text !important;

}

}
.dash-hero-subtitle {

  font-size: 9px !important;

  margin-top: 5px !important;
}

/* ── MASTER CONTROL — DEEP GLASS ── */
#dash-master-panel {
  background: linear-gradient(135deg,
    hsl(232 95% 64% / 0.09),
    hsl(258 88% 60% / 0.06),
    hsl(195 100% 54% / 0.04)) !important;
  border: 1px solid hsl(232 95% 64% / 0.2) !important;
  border-radius: 18px !important;
  box-shadow:
    0 0 0 1px hsl(232 95% 64% / 0.06) inset,
    0 12px 48px hsl(0 0% 0% / 0.6),
    0 0 80px hsl(232 95% 64% / 0.04) !important;
  animation: neon-border-pulse 4s ease-in-out infinite !important;
}
#dash-master-toggle {
  background: linear-gradient(135deg,
    hsl(232 95% 60%),
    hsl(258 88% 56%),
    hsl(195 100% 50%)) !important;
  background-size: 200% 200% !important;
  animation: aurora-shift 3s ease-in-out infinite !important;
  border-radius: 12px !important;
  box-shadow:
    0 0 40px hsl(232 95% 64% / 0.5),

  box-shadow:

    inset 0 1px 0 hsl(0 0% 100% / 0.3) !important;

/* ── STAT CARDS — ABYSS CRYSTALS ── */
.stat-card {
  background: hsl(240 6% 4.5%) !important;
  border: 1px solid hsl(240 6% 9%) !important;
  border-radius: 18px !important;
  box-shadow:
    0 4px 24px hsl(0 0% 0% / 0.7),
    inset 0 1px 0 hsl(0 0% 100% / 0.025) !important;
  position: relative !important;
  overflow: hidden !important;
}
/* Ambient corner light */
.stat-card::before {
  content: '' !important;
  position: absolute !important;
  top: 0 !important; left: 0 !important; right: 0 !important;
  height: 1px !important;
  background: linear-gradient(90deg,
    transparent 0%,
    hsl(232 95% 64% / 0.4) 50%,
    transparent 100%) !important;
  opacity: 0 !important;
  transition: opacity 0.3s !important;
}
.stat-card::after {
  content: '' !important;
  position: absolute !important;
  top: -60% !important; right: -30% !important;
  width: 90% !important; height: 90% !important;
  background: radial-gradient(ellipse, hsl(232 95% 64% / 0.05) 0%, transparent 70%) !important;
  pointer-events: none !important;
  opacity: 0 !important;
  transition: opacity 0.3s !important;
}
.stat-card:hover {
  background: hsl(240 6% 5.5%) !important;
  border-color: hsl(232 95% 64% / 0.22) !important;
  transform: translateY(-5px) !important;
  box-shadow:
    0 16px 50px hsl(0 0% 0% / 0.75),
    0 0 0 1px hsl(232 95% 64% / 0.1),
    inset 0 1px 0 hsl(232 95% 64% / 0.08) !important;
}
.stat-card:hover::before { opacity: 1 !important; }
.stat-card:hover::after  { opacity: 1 !important; }
.stat-card-value {
  font-size: 2rem !important;
  font-weight: 900 !important;
  letter-spacing: -0.04em !important;
  animation: stat-value-in 0.5s cubic-bezier(0.16,1,0.3,1) both !important;
}
.stat-card-label {
  color: hsl(240 4% 38%) !important;
  font-size: 8.5px !important;
  letter-spacing: 3px !important;
  font-weight: 800 !important;
}
.stat-card-icon {
  width: 34px !important;
  height: 34px !important;
  border-radius: 10px !important;
  box-shadow: 0 4px 14px hsl(0 0% 0% / 0.5) !important;
}
.stat-card-sub {
  color: hsl(240 4% 36%) !important;
  font-size: 10px !important;
  letter-spacing: 0.3px !important;

/* ── GLASS PANELS — DEEP VOID ── */

  border: 1px solid hsl(240 6% 9%) !important;
  border-radius: 18px !important;
  box-shadow:

}
.glass-panel-glow {
  background: hsl(240 6% 4.5%) !important;

}

/* ── EQUITY PANEL ── */
.dash-equity-panel {

  overflow: hidden !important;
}
.dash-equity-panel::after {
  content: '' !important;
  position: absolute !important;
  top: -30% !important; right: -10% !important;

  background: radial-gradient(ellipse, hsl(155 72% 46% / 0.04) 0%, transparent 70%) !important;

}

/* ── BOT CARDS — DEEP PANELS ── */
.bot-card {
  background: hsl(240 6% 4.5%) !important;
  border: 1px solid hsl(240 6% 10%) !important;
  border-radius: 14px !important;

  overflow: hidden !important;
}
.bot-card::before {
  content: '' !important;
  position: absolute !important;
  bottom: 0 !important; left: 0 !important; right: 0 !important;
  height: 2px !important;
  background: linear-gradient(90deg,
    hsl(232 95% 64% / 0.4),
    hsl(195 100% 54% / 0.3)) !important;
  opacity: 0 !important;
  transition: opacity 0.25s !important;
}
.bot-card:hover {
  background: hsl(240 6% 5.5%) !important;
  border-color: hsl(232 95% 64% / 0.18) !important;
  transform: translateY(-4px) !important;
  box-shadow: 0 12px 40px hsl(0 0% 0% / 0.75) !important;
  animation: bot-card-glow 0.3s ease forwards !important;
}

.bot-card-head {
  font-size: 9.5px !important;
  letter-spacing: 1.5px !important;
  color: hsl(240 4% 48%) !important;
  margin-bottom: 2px !important;
}
.bot-card-value {

}
.bot-card-dot {
  width: 6px !important; height: 6px !important;
  box-shadow: 0 0 8px currentColor !important;
}
.bar-track {
  background: hsl(240 6% 8%) !important;
  height: 3px !important;
  border-radius: 3px !important;
}
.bar-fill-win {
  background: linear-gradient(90deg,
    hsl(155 72% 46%),
    hsl(195 100% 54%)) !important;
  box-shadow: 0 0 10px hsl(155 72% 46% / 0.6) !important;
}

/* ── EXEC PANEL ── */
.exec-panel {

  border-radius: 18px !important;

}

}

/* ── BUTTONS — DEEP GLOW ── */

/* ── MODAL — VOID LUXURY ── */
.modal-overlay {

}

.settings-section {

}

}

    0 0 20px hsl(232 95% 64% / 0.4),

}

}

}

.hub-balance-pill {
  background: hsl(155 72% 46% / 0.08) !important;

}

/* ── P&L BADGE ── */
.pnl-badge.pos { background: hsl(155 72% 46% / 0.1) !important; box-shadow: 0 0 10px hsl(155 72% 46% / 0.15) !important; }

}
.live-tick-cell:hover {

/* ── BENZ COL (3-column trading desk) ── */
.benz-col {
  background: hsl(240 6% 4%) !important;

.signal-chip.buy {
  background: hsl(155 72% 46% / 0.1) !important;

/* ── Full Automation Toggle ──────────────────────────────────────── */
.dash-auto-toggle {
  width: 34px; height: 18px; border-radius: 999px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  position: relative; cursor: pointer; transition: background .22s, border-color .22s, box-shadow .22s;
  flex-shrink: 0;
}
.dash-auto-toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px; border-radius: 50%;
  background: rgba(150,160,185,0.55);
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), background .22s;
}
.dash-auto-toggle.on {
  background: hsl(var(--primary) / .18);
  border-color: hsl(var(--primary) / .5);
  box-shadow: 0 0 14px hsl(var(--primary) / .35);
}
.dash-auto-toggle.on::after {
  transform: translateX(16px);
  background: hsl(var(--primary));
  box-shadow: 0 0 8px hsl(var(--primary) / .8);
}
@keyframes cooldown-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
html body #panel-dashboard .exec-cd-bar {
  height: 3px !important; border-radius: 999px !important;
  background: rgba(255,170,0,0.12) !important; overflow: hidden !important;
}
html body #panel-dashboard .exec-cd-fill {
  height: 100% !important; border-radius: 999px !important;
  background: linear-gradient(90deg, #ffaa00, #ff6600) !important;
  box-shadow: 0 0 8px rgba(255,170,0,0.5) !important;
  width: 100% !important;
}
@keyframes exec-cd-drain { from { width: 100%; } to { width: 0%; } }

/* ── Dashboard circular CD ring ── */
.exec-cd-ring-wrap {
  position: relative; display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; flex-shrink: 0;
}
.exec-cd-ring-svg { position: absolute; inset: 0; }
.exec-cd-ring-track { stroke: rgba(255,170,0,0.15); }
.exec-cd-ring-arc {

  filter: drop-shadow(0 0 5px rgba(255,170,0,0.7));
}
.exec-cd-ring-num {
  position: relative; z-index: 1;

  color: #ffaa00; letter-spacing: -0.5px; line-height: 1;

/* ── Live Entry Conditions Panel ── */
.entry-conditions-panel {
  background: linear-gradient(135deg, hsl(var(--card)), hsl(var(--bg)));
  border: 1px solid hsl(var(--border));
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.entry-conditions-panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, hsl(var(--primary)/0.6), hsl(var(--secondary)/0.4), transparent);
  transition: background 0.4s;
}
.entry-conditions-panel.all-met::before {
  background: linear-gradient(90deg, hsl(var(--win)), hsl(var(--secondary)));
  box-shadow: 0 0 16px hsl(var(--win)/0.4);
  animation: cond-fire-glow 0.6s ease;
}
@keyframes cond-fire-glow {
  0%   { box-shadow: 0 0 0px hsl(var(--win)/0); }
  50%  { box-shadow: 0 0 30px hsl(var(--win)/0.8); }
  100% { box-shadow: 0 0 16px hsl(var(--win)/0.4); }
}
.entry-cond-title {
  display: flex; align-items: center; gap: 7px;
  font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 800;
  letter-spacing: 2px; text-transform: uppercase;
  color: hsl(var(--muted-foreground)); margin-bottom: 10px;
}
.entry-cond-pulse {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: hsl(var(--muted-foreground));
  transition: background 0.3s, box-shadow 0.3s;
}
.entry-cond-pulse.active {
  background: hsl(var(--win));
  box-shadow: 0 0 10px hsl(var(--win)/0.7);
  animation: pulse-dot 1.2s ease-in-out infinite;
}
.entry-cond-pulse.firing {
  background: hsl(var(--primary));
  box-shadow: 0 0 16px hsl(var(--primary)/0.9);
  animation: pulse-fire 0.4s ease-in-out infinite alternate;
}
@keyframes pulse-dot  { 0%,100% { box-shadow: 0 0 6px hsl(var(--win)/0.5); } 50% { box-shadow: 0 0 14px hsl(var(--win)/0.9); } }
@keyframes pulse-fire { 0% { box-shadow: 0 0 8px hsl(var(--primary)/0.7); } 100% { box-shadow: 0 0 24px hsl(var(--primary)); } }
.entry-cond-status {
  margin-left: auto; font-size: 8px; font-weight: 900; letter-spacing: 1.5px;
  padding: 2px 7px; border-radius: 999px;
  background: hsl(var(--muted)); color: hsl(var(--muted-foreground));
  transition: all 0.3s;
}
.entry-cond-status.met { background: hsl(var(--win)/0.15); color: hsl(var(--win)); border: 1px solid hsl(var(--win)/0.3); }
.entry-cond-status.fire { background: hsl(var(--primary)/0.2); color: hsl(var(--primary)); border: 1px solid hsl(var(--primary)/0.5); animation: shimmer-sweep 1s linear infinite; }
.entry-cond-list {
  display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px;
}
.entry-cond-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 9px; border-radius: 9px;
  background: hsl(var(--bg)); border: 1px solid hsl(var(--border));
  font-size: 10.5px; font-family: 'DM Mono', monospace;
  transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  position: relative; overflow: hidden;
}
.entry-cond-row.met {
  background: hsl(var(--win)/0.06); border-color: hsl(var(--win)/0.35);
  box-shadow: 0 0 8px hsl(var(--win)/0.1);
}
.entry-cond-row.pending {
  background: hsl(var(--primary)/0.04); border-color: hsl(var(--border));
}
.entry-cond-row.loading { opacity: 0.5; }
.entry-cond-row::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, hsl(var(--win)/0.08), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.entry-cond-row.met::after { opacity: 1; }
.entry-cond-icon { font-size: 11px; flex-shrink: 0; width: 16px; text-align: center; }
.entry-cond-label { flex: 1; color: hsl(var(--foreground)/0.8); }
.entry-cond-value {
  font-size: 9.5px; font-weight: 700; color: hsl(var(--muted-foreground));
  background: hsl(var(--bg)); padding: 1px 6px; border-radius: 5px;
  border: 1px solid hsl(var(--border)/0.5);
  min-width: 32px; text-align: center;
  transition: all 0.2s;
}
.entry-cond-row.met .entry-cond-value { color: hsl(var(--win)); border-color: hsl(var(--win)/0.3); }
.entry-cond-progress {
  height: 4px; background: hsl(var(--muted)); border-radius: 99px; overflow: hidden; margin-bottom: 5px;
}
.entry-cond-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, hsl(var(--primary)), hsl(var(--secondary)));
  transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 0 6px hsl(var(--primary)/0.5);
}
.entry-cond-fill.full {
  background: linear-gradient(90deg, hsl(var(--win)), hsl(var(--secondary)));
  box-shadow: 0 0 12px hsl(var(--win)/0.6);
}
.entry-cond-pct {
  font-size: 9px; color: hsl(var(--muted-foreground));
  font-family: 'DM Mono', monospace; text-align: right; letter-spacing: 0.5px;
}

  <div id="global-error-toast" class="global-error-toast" role="alert" aria-live="assertive"></div>
  <script>
    (function(){
      let lastShown=0;
      function showErrorToast(msg){
        const now=Date.now(); if(now-lastShown<4000)return; lastShown=now;
        const el=document.getElementById('global-error-toast'); if(!el)return;
        el.textContent='⚠ '+msg+' — reload if things look stuck.';
        el.classList.add('show'); clearTimeout(el._t);
        el._t=setTimeout(()=>el.classList.remove('show'),7000);
      }
      window.addEventListener('error',e=>showErrorToast((e?.message||'Error').slice(0,160)));
      window.addEventListener('unhandledrejection',e=>{
        const m=e?.reason?.message||String(e?.reason||'Background task failed');
        showErrorToast(m.slice(0,160));
      });
    })();
  </script>

<script>/* ============================================================
   HubStore — single source of truth for the whole site.
   One API token, one theme, one Telegram config. Every engine
   (Differ, Even, Odd, Over/Under) and the Dashboard reads from
   here instead of keeping its own copy or asking for its own key.
   ============================================================ */
(function (global) {
  'use strict';

  function load(key, fallback) {
    try { const v = localStorage.getItem(key); return v === null ? fallback : v; } catch (e) { return fallback; }
  }
  // Mirror of load(): never let a storage failure (quota exceeded, private
  // browsing restrictions, storage disabled) abort the function that calls
  // it — persistence is best-effort, but app state must always still update.
  function save(key, value) {
    try { localStorage.setItem(key, value); } catch (e) { /* storage unavailable — state still updates in-memory */ }
  }

  const listeners = new Set();
  const state = {
    apiToken: load('hub_api_token', ''),
    accountType: load('hub_account_type', 'demo'), // 'demo' or 'real'
    appId: (() => { const v = load('hub_app_id', ''); return v || '33ADPhDZXR2F60qhPudXB'; })(), // Alphanumeric App ID from developers.deriv.com — used in REST Deriv-App-ID header
    wsAppId: (() => { const v = load('hub_ws_app_id', ''); return v || '1089'; })(),             // Numeric App ID — used in wss://ws.derivws.com public/analysis sockets
    accountId: '',
    balanceUSD: 0,
    currency: 'USD',
    isAuthenticated: false,
    connectionStatus: 'disconnected', // disconnected | connecting | connected
    connectionError: '',
    theme: load('hub_theme', 'luminous'),
    telegramToken: load('hub_tg_token', ''),
    telegramChatId: load('hub_tg_chat', ''),
    telegramEnabled: load('hub_tg_enabled', 'false') === 'true',
    derivHistory: [], // past trades fetched from Deriv on connect
    // Per-bot "allowed to engage" switch. Defaults to all enabled.
    // A bot can still be armed/configured when disabled, but its engage
    // action is blocked until this is checked again.
    botEnabled: (() => {
      const defaults = { differ: true, even: true, odd: true, nexus: true };
      try {
        const saved = JSON.parse(load('hub_bot_enabled', 'null'));
        return saved ? { ...defaults, ...saved } : defaults;
      } catch (e) { return defaults; }
    })(),
  };

  // New Deriv API: REST to fetch account ID, then OTP to get authenticated WS URL.
  // App IDs from developers.deriv.com are alphanumeric (e.g. "33ADPhDZXR2F60qhPudXB").
  // PAT is used as Bearer token in REST headers.
  const API_BASE = 'https://api.derivws.com';

  function getAuthHeaders() {
    return {
      'Authorization': `Bearer ${state.apiToken}`,
      'Deriv-App-ID': state.appId,
      'Content-Type': 'application/json',
    };
  }

  // Auth handled directly in connectAccount via classic WS authorize flow

  function emit() { listeners.forEach((cb) => { try { cb(state); } catch (e) { /* */ } }); }

  function setTheme(theme) {
    state.theme = theme;
    save('hub_theme', theme);
    document.documentElement.className = theme;
    emit();
  }

  function setTelegram(token, chatId) {
    state.telegramToken = token; state.telegramChatId = chatId;
    save('hub_tg_token', token);
    save('hub_tg_chat', chatId);
    emit();
  }

  function setTelegramEnabled(on) {
    state.telegramEnabled = on;
    save('hub_tg_enabled', on.toString());
    emit();
  }

  function setAccountType(accountType) {
    state.accountType = accountType;
    save('hub_account_type', accountType);
    emit();
    connectAccount(); // reconnect to pick the right account (demo vs real)
    global.dispatchEvent(new CustomEvent('hub:account-type-changed', { detail: { accountType, appId: state.appId } }));
  }


  async function notifyTelegram(message) {
    if (!state.telegramEnabled || !state.telegramToken || !state.telegramChatId) return;
    try {
      await fetch(`https://api.telegram.org/bot${state.telegramToken}/sendMessage`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: state.telegramChatId, text: message, parse_mode: 'HTML' }),
      });
    } catch (e) { /* */ }
  }

  let statusSocket = null;
  let reconnectTimer = null;
  let reconnectDelay = 8000;

  function connectAccount() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (!state.apiToken) {
      state.isAuthenticated = false;
      state.connectionStatus = 'disconnected';
      state.connectionError = '';
      reconnectDelay = 8000;
      emit();
      return;
    }
    try { if (statusSocket) { statusSocket.onclose = null; statusSocket.close(); } } catch (e) { /* */ }
    state.connectionStatus = 'connecting';
    state.connectionError = '';
    emit();

    // 2026 Deriv API flow:
    // 1. REST POST /trading/v1/options/accounts/{accountId}/otp  → get OTP WebSocket URL
    // 2. WebSocket connect to that URL (auth is embedded, no {authorize} message needed)
    // We first fetch accounts to discover the accountId, then get the OTP.
    let pingInterval = null;

    async function connectViaOtp() {
      // Step 1: get accounts list to find the correct accountId
      let accountId = state.accountId;
      const appId = state.appId || '33ADPhDZXR2F60qhPudXB';
      const headers = { 'Authorization': `Bearer ${state.apiToken}`, 'Deriv-App-ID': appId, 'Content-Type': 'application/json' };

      if (!accountId) {
        try {
          const acctResp = await fetch('https://api.derivws.com/trading/v1/options/accounts', { headers });
          if (!acctResp.ok) {
            const err = await acctResp.json().catch(() => ({}));
            throw new Error((err.errors && err.errors[0]?.message) || `Accounts fetch failed (${acctResp.status})`);
          }
          const acctData = await acctResp.json();
          // Pick demo or real account based on accountType setting
          const accounts = acctData.data || [];
          const preferred = state.accountType === 'real'
            ? accounts.find(a => !a.is_virtual) || accounts[0]
            : accounts.find(a => a.is_virtual) || accounts[0];
          if (!preferred) throw new Error('No accounts found for this token');
          accountId = preferred.account_id;
          state.accountId = accountId;
          state.currency = preferred.currency || state.currency;
        } catch (e) {
          state.isAuthenticated = false;
          state.connectionStatus = 'disconnected';
          state.connectionError = e.message || 'Could not fetch accounts — check your token and App ID';
          emit();
          return;
        }
      }

      // Step 2: POST OTP to get authenticated WebSocket URL
      let wsUrl;
      try {
        const otpResp = await fetch(`https://api.derivws.com/trading/v1/options/accounts/${accountId}/otp`, { method: 'POST', headers });
        if (!otpResp.ok) {
          const err = await otpResp.json().catch(() => ({}));
          throw new Error((err.errors && err.errors[0]?.message) || `OTP request failed (${otpResp.status})`);
        }
        const otpData = await otpResp.json();
        wsUrl = otpData.data?.url;
        if (!wsUrl) throw new Error('No WebSocket URL in OTP response');
      } catch (e) {
        state.isAuthenticated = false;
        state.connectionStatus = 'disconnected';
        state.connectionError = e.message || 'OTP request failed — check your App ID and token scopes';
        emit();
        return;
      }

      // Step 3: Connect to the authenticated WebSocket URL
      try { if (statusSocket) { statusSocket.onclose = null; statusSocket.close(); } } catch (_) {}
      const ws = new WebSocket(wsUrl);
      statusSocket = ws;

      ws.onerror = () => {
        state.connectionError = 'WebSocket connection failed — check your internet connection.';
        emit();
      };
      ws.onopen = () => {
        reconnectDelay = 8000;
        state.isAuthenticated = true;
        state.connectionStatus = 'connected';
        state.connectionError = '';
        emit();
        // Subscribe to live balance updates + keep alive
        try {
          ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
          pingInterval = setInterval(() => {
            if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ ping: 1 }));
          }, 25000);
        } catch (e) { /* */ }
      };
      ws.onmessage = (m) => {
        try {
          const d = JSON.parse(m.data);
          if (d.msg_type === 'balance' && d.balance) {
            const bal = parseFloat(d.balance.balance);
            if (!isNaN(bal)) { state.balanceUSD = bal; state.currency = d.balance.currency || state.currency; emit(); }
          }
        } catch (e) { /* */ }
      };
      ws.onclose = () => {
        if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
        state.connectionStatus = 'disconnected';
        state.isAuthenticated = false;
        emit();
        if (state.apiToken) {
          reconnectTimer = setTimeout(connectAccount, reconnectDelay);
          reconnectDelay = Math.min(reconnectDelay * 1.5, 60000);
        }
      };
    }
    connectViaOtp();
  }

  function setToken(token) {
    state.apiToken = token;
    state.accountId = ''; // clear cached account so OTP fetch re-resolves for the new token
    save('hub_api_token', token);
    emit();
    connectAccount();
    global.dispatchEvent(new CustomEvent('hub:token-changed', { detail: { token } }));
  }

  function setAppId(appId) {
    appId = (appId || '').trim() || '33ADPhDZXR2F60qhPudXB'; // new alphanumeric format from developers.deriv.com
    state.appId = appId;
    save('hub_app_id', appId);
    emit();
    connectAccount();
    global.dispatchEvent(new CustomEvent('hub:appid-changed', { detail: { appId } }));
  }

  function setWsAppId(wsAppId) {
    wsAppId = (wsAppId || '').trim().replace(/\D/g, '') || '1089'; // numeric only
    state.wsAppId = wsAppId;
    save('hub_ws_app_id', wsAppId);
    emit();
    // Fire event so analysis engines reconnect with the new numeric App ID
    global.dispatchEvent(new CustomEvent('hub:wsappid-changed', { detail: { wsAppId } }));
  }

  function setBotEnabled(botId, enabled) {
    state.botEnabled = { ...state.botEnabled, [botId]: enabled };
    save('hub_bot_enabled', JSON.stringify(state.botEnabled));
    emit();
  }

  function isBotEnabled(botId) {
    return state.botEnabled[botId] !== false;
  }

  global.HubStore = {
    getAuthenticatedWsUrl: () => Promise.reject(new Error('Use WS authorize flow')),
    getState: () => state,
    subscribe(cb) { listeners.add(cb); return () => listeners.delete(cb); },
    setToken, setTheme, setTelegram, setTelegramEnabled, setAccountType, setAppId, setWsAppId, notifyTelegram, connectAccount,
    getDerivHistory: () => state.derivHistory,
    setBotEnabled, isBotEnabled,
  };

  setTimeout(connectAccount, 300);
})(window);
</script>
<script>
(function () {
  'use strict';
  class SoundEngine {
    constructor() {
      this.audioContext = null;
      this.enabled = true;
    }
    getContext() {
      if (!this.audioContext) {
        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      // Resume if suspended (Chrome autoplay policy requires user gesture first)
      if (this.audioContext.state === 'suspended') {
        this.audioContext.resume().catch(() => {});
      }
      return this.audioContext;
    }
    // Call this on any user interaction to unlock audio
    unlock() {
      try {
        const ctx = this.getContext();
        if (ctx.state === 'suspended') ctx.resume().catch(() => {});
      } catch (e) { /* */ }
    }
    toggle(on) { this.enabled = on; }
    playTone(frequency, duration, type = 'sine', gain = 0.3) {
      if (!this.enabled) return;
      try {
        const ctx = this.getContext();
        // Chrome autoplay policy: don't attempt to play if context is still suspended
        // (no user gesture yet). The unlock() call on first click will resume it.
        if (ctx.state === 'suspended') return;
        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, ctx.currentTime);
        gainNode.gain.setValueAtTime(gain, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + duration);
      } catch (e) { /* audio unavailable */ }
    }
    playWin() {
      this.playTone(523.25, 0.1, 'sine', 0.2);
      setTimeout(() => this.playTone(659.25, 0.1, 'sine', 0.2), 100);
      setTimeout(() => this.playTone(783.99, 0.2, 'sine', 0.3), 200);
    }
    playLoss() {
      this.playTone(392, 0.15, 'sawtooth', 0.15);
      setTimeout(() => this.playTone(293.66, 0.2, 'sawtooth', 0.1), 150);
    }
    playExecute() { this.playTone(880, 0.05, 'square', 0.1); }
    playConnect() {
      this.playTone(440, 0.1, 'sine', 0.2);
      setTimeout(() => this.playTone(660, 0.1, 'sine', 0.2), 100);
      setTimeout(() => this.playTone(880, 0.15, 'sine', 0.25), 200);
    }
    playAlert() {
      this.playTone(800, 0.1, 'square', 0.15);
      setTimeout(() => this.playTone(800, 0.1, 'square', 0.15), 200);
    }
    playEngineStart() {
      for (let i = 0; i < 5; i++) setTimeout(() => this.playTone(200 + i * 100, 0.1, 'sawtooth', 0.1), i * 80);
    }
    playEngineStop() {
      for (let i = 0; i < 5; i++) setTimeout(() => this.playTone(600 - i * 100, 0.1, 'sawtooth', 0.1), i * 80);
    }
    playTick() { this.playTone(1200, 0.02, 'sine', 0.05); }
    // Differ-specific cues, merged in from the legacy per-tab AudioEngine so
    // every tab now shares ONE AudioContext + ONE mute switch instead of each
    // tab running its own isolated, unmutable audio pipeline.
    playFire() { this.playTone(1500, 0.04, 'square', 0.12); }
    playCooldown() { this.playTone(440, 0.15, 'sine', 0.18); }
    playAbort() {
      this.playTone(300, 0.1, 'square', 0.18);
      setTimeout(() => this.playTone(150, 0.12, 'square', 0.16), 90);
    }
  }
  const sharedSoundEngine = new SoundEngine();
  window.Sounds = { soundEngine: sharedSoundEngine };
  // Single AudioContext for the whole hub, exposed on window so the global
  // mute toggle in Settings can suspend/resume it directly (see
  // applyMuteState below). Lazily created on first playTone() call.
  Object.defineProperty(window, '_benzAudioCtx', {
    get() { return sharedSoundEngine.audioContext; },
    configurable: true,
  });

  // Unlock AudioContext on first user interaction (Chrome autoplay policy)
  function unlockAudio() {
    window.Sounds.soundEngine.unlock();
    document.removeEventListener('click', unlockAudio);
    document.removeEventListener('keydown', unlockAudio);
    document.removeEventListener('touchstart', unlockAudio);
  }
  document.addEventListener('click', unlockAudio);
  document.addEventListener('keydown', unlockAudio);
  document.addEventListener('touchstart', unlockAudio);
})();

<script>
(function () {
  'use strict';

  function getPublicWsUrl() { const id = (window.HubStore && window.HubStore.getState().wsAppId) || (function(){ try { return localStorage.getItem('hub_ws_app_id') || ''; } catch(_){ return ''; } })() || '1089'; return 'wss://ws.derivws.com/websockets/v3?app_id=' + id; }
  const MARKETS = [
    { value: '1HZ10V', label: '⚡ Volatility 10 (1s)' }, { value: 'R_10', label: 'Volatility 10' },
    { value: '1HZ25V', label: '⚡ Volatility 25 (1s)' }, { value: 'R_25', label: 'Volatility 25' },
    { value: '1HZ50V', label: '⚡ Volatility 50 (1s)' }, { value: 'R_50', label: 'Volatility 50' },
    { value: '1HZ75V', label: '⚡ Volatility 75 (1s)' }, { value: 'R_75', label: 'Volatility 75' },
    { value: '1HZ100V', label: '⚡ Volatility 100 (1s)' }, { value: 'R_100', label: 'Volatility 100' },
    { value: '1HZ150V', label: '⚡ Volatility 150 (1s)' }, { value: '1HZ200V', label: '⚡ Volatility 200 (1s)' },
    { value: '1HZ250V', label: '⚡ Volatility 250 (1s)' }, { value: '1HZ300V', label: '⚡ Volatility 300 (1s)' },
    { value: 'RDBULL', label: 'Bull Market' }, { value: 'RDBEAR', label: 'Bear Market' },
  ];

  function getGlobalMarket(primary) {
    if (primary.includes('1HZ')) return primary.replace('1HZ', 'R_').replace('V', '');
    if (primary.startsWith('R_')) return '1HZ' + primary.replace('R_', '') + 'V';
    return 'R_100';
  }

  // Differ's audio now goes through the single shared engine (window.Sounds)
  // used by every other tab, so the dashboard's master mute toggle controls
  // ALL four tabs from one switch instead of leaving Differ's sounds rogue.
  const audio = {
    trigger() { window.Sounds.soundEngine.playConnect(); },
    fire()     { window.Sounds.soundEngine.playFire(); },
    win()      { window.Sounds.soundEngine.playWin(); },
    loss()     { window.Sounds.soundEngine.playLoss(); },
    cooldown() { window.Sounds.soundEngine.playCooldown(); },
    abort()    { window.Sounds.soundEngine.playAbort(); },
  };

  function computeFrequency(history, tickIndex) {
    const freq = Array.from({ length: 10 }, (_, i) => ({ digit: i, count: 0, percentage: 0, lastSeen: -1, coldStreak: 0 }));
    history.forEach((d, idx) => { freq[d].count++; freq[d].lastSeen = idx; });
    const total = history.length || 1;
    freq.forEach((f) => { f.percentage = (f.count / total) * 100; f.coldStreak = f.lastSeen >= 0 ? tickIndex - f.lastSeen : tickIndex; });
    return freq;
  }

  function getColdestDigits(freqP) {
    const nonZero = freqP.filter((f) => f.digit !== 0);
    const sorted = [...nonZero].sort((a, b) => a.count - b.count);
    return { cold: sorted[0]?.digit ?? 1, third: sorted[1]?.digit ?? null, top3: sorted.slice(0, 3).map((f) => f.digit) };
  }

  function determineLuckyNumber(coldStreakHistory) {
    if (coldStreakHistory.length < 3) return 12;
    let best = 12, bestScore = 0;
    for (let threshold = 6; threshold <= 25; threshold++) {
      const ratio = coldStreakHistory.filter((s) => s >= threshold).length / coldStreakHistory.length;
      if (ratio >= 0.6 && threshold > bestScore) { bestScore = threshold; best = threshold; }
    }
    if (bestScore === 0) {
      const sorted = [...coldStreakHistory].sort((a, b) => a - b);
      best = Math.max(6, sorted[Math.floor(sorted.length / 2)] - 2);
    }
    return best;
  }

  class BenzEngine {
    constructor() {
      this.onUpdate = null;
      this.socketP = null; this.socketG = null; this.socketT = null;
      this.cooldownTimer = null; this.tickIndex = 0; this.abortFlag = false;
      this.reconnectTimer = null;
      // Contracts fired by THIS engine instance. proposal_open_contract is an
      // account-wide stream (no per-contract scoping is possible without a
      // contract_id), so without this filter results from other bots — or
      // from manual trades on the Deriv platform — would leak into this
      // engine's journal. Every contract_id is added on buy confirmation and
      // removed once its result has been recorded.
      this.ownContractIds = new Set();
      this.state = this.loadInitialState();
      this._bindMethods();
      this.connectAnalysis();
      if (window.HubStore.getState().apiToken) setTimeout(() => this.authenticate(), 500);
      window.addEventListener('hub:token-changed', () => this.authenticate());
      window.addEventListener('hub:account-type-changed', () => this.authenticate());
    }

    _bindMethods() {
      ['executeBurst', 'startCooldown', 'connectAnalysis', 'authenticate', 'armSystem', 'disarmSystem', 'abortTrades'].forEach((m) => {
        this[m] = this[m].bind(this);
      });
    }

    loadInitialState() {
      return {
        isAuthenticated: false, balanceUSD: 0,
        primaryMarket: '1HZ100V', globalMarket: getGlobalMarket('1HZ100V'),
        historyP: [], historyG: [],
        freqP: Array.from({ length: 10 }, (_, i) => ({ digit: i, count: 0, percentage: 0, lastSeen: -1, coldStreak: 0 })),
        freqG: Array.from({ length: 10 }, (_, i) => ({ digit: i, count: 0, percentage: 0, lastSeen: -1, coldStreak: 0 })),
        coldDigit: null, thirdColdDigit: null, currentTick: null, silenceCount: 0,
        luckyNumber: 12, recommendedMarket: '1HZ100V', analysisConfidence: 0,
        coldStreakHistory: [], stake: 1, batchSize: 4, speed: 50, silenceTrigger: 12,
        isArmed: false, isRunning: false, isCooldown: false, cooldownRemaining: 0,
        autoMode: true, takeProfit: 15, stopLoss: 10, autoBatchSize: 4,
        journal: [], totalWins: 0, totalLoss: 0, totalProfit: 0,
        notifications: [], firedCount: 0, abortOnLoss: true,
        connectionStatus: 'disconnected', experiment: null,
        experimentHistory: this.loadExperimentHistory(),
        plHistory: [],
      };
    }

    // Isolated from loadInitialState so a corrupted localStorage value or a
    // storage-disabled context (private browsing, quota errors) can never
    // throw during construction and take down the whole engine.
    loadExperimentHistory() {
      try {
        const raw = localStorage.getItem('benz_experiments');
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    emit() { if (this.onUpdate) this.onUpdate(this.state); }

    dispatch(action) {
      const s = this.state;
      switch (action.type) {
        case 'AUTHENTICATED': s.isAuthenticated = true; s.balanceUSD = action.balance; s.connectionStatus = 'connected'; break;
        case 'DISCONNECT': s.isAuthenticated = false; s.balanceUSD = 0; s.connectionStatus = 'disconnected'; break;
        case 'SET_CONNECTION_STATUS': s.connectionStatus = action.status; break;
        case 'SET_MARKET':
          s.primaryMarket = action.market; s.globalMarket = getGlobalMarket(action.market);
          s.historyP = []; s.historyG = []; s.silenceCount = 0; s.coldDigit = null;
          break;
        case 'TICK_P': {
          const newHist = [...s.historyP, action.digit].slice(-150);
          const isCold = s.coldDigit !== null && action.digit === s.coldDigit;
          const newSilence = isCold ? 0 : (s.coldDigit !== null ? s.silenceCount + 1 : 0);
          s.historyP = newHist; s.currentTick = action.digit; s.silenceCount = newSilence;
          if (isCold) s.coldStreakHistory = [...s.coldStreakHistory, s.silenceCount].slice(-50);
          break;
        }
        case 'TICK_G': s.historyG = [...s.historyG, action.digit].slice(-150); break;
        case 'SET_COLD': s.coldDigit = action.cold; s.thirdColdDigit = action.third; break;
        case 'SET_STAKE': s.stake = action.value; break;
        case 'SET_BATCH': s.batchSize = action.value; break;
        case 'SET_SPEED': s.speed = action.value; break;
        case 'SET_TRIGGER': s.silenceTrigger = action.value; break;
        case 'ARM': s.isArmed = true; break;
        case 'DISARM': s.isArmed = false; s.isRunning = false; break;
        case 'FIRING': s.isRunning = true; s.isArmed = false; s.firedCount = 0; break;
        case 'FIRE_COMPLETE': s.isRunning = false; s.firedCount = action.firedCount; break;
        case 'COOLDOWN_START': s.isCooldown = true; s.cooldownRemaining = action.duration; break;
        case 'COOLDOWN_TICK': s.cooldownRemaining = action.remaining; break;
        case 'COOLDOWN_END': s.isCooldown = false; s.cooldownRemaining = 0; s.silenceCount = 0; break;
        case 'TOGGLE_AUTO': s.autoMode = !s.autoMode; break;
        case 'SET_TP': s.takeProfit = action.value; break;
        case 'SET_SL': s.stopLoss = action.value; break;
        case 'SET_AUTO_BATCH': s.autoBatchSize = action.value; break;
        case 'ADD_JOURNAL': {
          const entry = action.entry;
          const isWin = entry.type === 'win';
          s.totalProfit += entry.profit;
          s.journal = [entry, ...s.journal].slice(0, 500);
          s.totalWins += isWin ? 1 : 0;
          s.totalLoss += isWin ? 0 : 1;
          s.plHistory = [...s.plHistory, { time: entry.time, profit: entry.profit, cumulative: s.totalProfit }].slice(-200);
          if (s.experiment?.isRunning) s.experiment.trades = [...s.experiment.trades, entry];
          break;
        }
        case 'RESET_JOURNAL': s.journal = []; s.totalWins = 0; s.totalLoss = 0; s.totalProfit = 0; s.plHistory = []; break;
        case 'UPDATE_BALANCE': if (!isNaN(action.balance)) s.balanceUSD = action.balance; break;
        case 'SET_LUCKY': s.luckyNumber = action.value; break;
        case 'SET_RECOMMENDED_MARKET': s.recommendedMarket = action.market; s.analysisConfidence = action.confidence; break;
        case 'NOTIFY': {
          const id = Date.now().toString() + Math.random().toString(36).slice(2, 6);
          const time = new Date().toLocaleTimeString();
          s.notifications = [...s.notifications, { id, message: action.message, type: action.ntype, time }].slice(-50);
          if (s.experiment?.isRunning) s.experiment.notifications.push(`[${time}] ${action.message}`);
          break;
        }
        case 'UPDATE_FREQ': s.freqP = action.freqP; s.freqG = action.freqG; break;
        case 'TOGGLE_ABORT_ON_LOSS': s.abortOnLoss = !s.abortOnLoss; break;
        case 'START_EXPERIMENT':
          s.experiment = { id: Date.now().toString(), startTime: Date.now(), durationMinutes: action.durationMinutes, trades: [], notifications: [], isRunning: true, pausedAt: null, elapsedMs: 0 };
          break;
        case 'STOP_EXPERIMENT': {
          if (!s.experiment) break;
          const finished = { ...s.experiment, isRunning: false };
          s.experimentHistory = [finished, ...s.experimentHistory].slice(0, 20);
          try { localStorage.setItem('benz_experiments', JSON.stringify(s.experimentHistory)); } catch (e) { /* storage unavailable — kept in memory for this session */ }
          s.experiment = null;
          break;
        }
        case 'PAUSE_EXPERIMENT': if (s.experiment) { s.experiment.isRunning = false; s.experiment.pausedAt = Date.now(); } break;
        case 'RESUME_EXPERIMENT': if (s.experiment) { s.experiment.isRunning = true; s.experiment.pausedAt = null; } break;
        case 'UPDATE_EXPERIMENT_ELAPSED': if (s.experiment) s.experiment.elapsedMs = action.elapsedMs; break;
        case 'CLEAR_EXPERIMENTS': try { localStorage.removeItem('benz_experiments'); } catch (e) { /* */ } s.experimentHistory = []; break;

        default: break;
      }
      this.runAnalysis();
      this.checkEntry();
      this.emit();
    }

    runAnalysis() {
      const s = this.state;
      if (s.historyP.length < 15) return;
      const freqP = computeFrequency(s.historyP, this.tickIndex);
      const freqG = computeFrequency(s.historyG, this.tickIndex);
      const { cold, third } = getColdestDigits(freqP);
      s.coldDigit = cold; s.thirdColdDigit = third;
      s.freqP = freqP; s.freqG = freqG;
      s.luckyNumber = determineLuckyNumber(s.coldStreakHistory);
      const nonZero = freqP.filter((f) => f.digit !== 0);
      const spread = Math.max(...nonZero.map((f) => f.count)) - Math.min(...nonZero.map((f) => f.count));
      s.analysisConfidence = Math.min(100, Math.round((spread / Math.max(s.historyP.length / 10, 1)) * 100));
      s.recommendedMarket = s.primaryMarket;
    }

    checkEntry() {
      const s = this.state;
      if (!s.isArmed || s.isRunning || s.isCooldown) return;
      if (s.coldDigit !== null && s.silenceCount >= s.silenceTrigger) {
        this.executeBurst();
      }
    }

    async executeBurst() {
      const s = this.state;
      if (!this.socketT || this.socketT.readyState !== WebSocket.OPEN) {
        this.dispatch({ type: 'NOTIFY', message: 'ERROR: Trading socket not connected. Please sync API token.', ntype: 'loss' });
        this.dispatch({ type: 'DISARM' });
        return;
      }
      this.dispatch({ type: 'FIRING' });
      this.abortFlag = false;
      audio.trigger();
      let batch = s.autoMode ? s.autoBatchSize : s.batchSize;
      const speed = s.speed;
      const stake = s.stake;
      const barrier = s.coldDigit;
      const msg = `⚡ ATOMIC TRIGGER! Firing ${batch} contracts on differ ≠${barrier}`;
      this.dispatch({ type: 'NOTIFY', message: msg, ntype: 'info' });
      window.HubStore.notifyTelegram(`🔥 ${msg}`);
      let firedCount = 0;
      const fireOne = () => {
        this.socketT.send(JSON.stringify({
          buy: '1', price: stake,
          parameters: { amount: stake, basis: 'stake', contract_type: 'DIGITDIFF', barrier, underlying_symbol: s.primaryMarket, duration: 1, duration_unit: 't', currency: window.HubStore.getState().currency || 'USD' },
        }));
      };
      if (speed <= 100) {
        for (let i = 0; i < batch; i++) { try { fireOne(); firedCount++; } catch (e) { /* */ } }
        audio.fire();
      } else {
        for (let i = 0; i < batch; i++) {
          if (this.abortFlag) { this.dispatch({ type: 'NOTIFY', message: `⛔ ABORT! Stopped after ${firedCount}/${batch}`, ntype: 'loss' }); break; }
          try { fireOne(); firedCount++; audio.fire(); } catch (e) { /* */ }
          if (i < batch - 1) await new Promise((r) => setTimeout(r, speed));
        }
      }
      this.dispatch({ type: 'FIRE_COMPLETE', firedCount });
      if (firedCount > 0) this.dispatch({ type: 'NOTIFY', message: `✓ Burst complete: ${firedCount} contracts fired`, ntype: 'info' });
      this.startCooldown();
    }

    startCooldown() {
      const s = this.state;
      const duration = 15;
      this.dispatch({ type: 'COOLDOWN_START', duration });
      audio.cooldown();
      // Show blur popup overlay like Titan engines
      this._showDifferCooldownOverlay(duration);
      if (this.cooldownTimer) clearInterval(this.cooldownTimer);
      let remaining = duration;
      this.cooldownTimer = setInterval(() => {
        remaining--;
        this._updateDifferCooldownOverlay(remaining);
        if (remaining <= 0) {
          clearInterval(this.cooldownTimer); this.cooldownTimer = null;
          this._hideDifferCooldownOverlay();
          this.dispatch({ type: 'COOLDOWN_END' });
          const cs = this.state;
          if (cs.autoMode) {
            const freqP = computeFrequency(cs.historyP, this.tickIndex);
            const { cold, third } = getColdestDigits(freqP);
            this.dispatch({ type: 'SET_COLD', cold, third });
            this.dispatch({ type: 'SET_LUCKY', value: determineLuckyNumber(cs.coldStreakHistory) });
            if (cs.totalProfit >= cs.takeProfit) {
              const m = `🏆 TAKE PROFIT reached: ${cs.totalProfit.toFixed(2)}`;
              this.dispatch({ type: 'NOTIFY', message: m, ntype: 'win' });
              window.HubStore.notifyTelegram(m);
            } else if (cs.totalProfit < 0 && Math.abs(cs.totalProfit) >= cs.stopLoss) {
              const m = `🛑 STOP LOSS reached: ${cs.totalProfit.toFixed(2)}`;
              this.dispatch({ type: 'NOTIFY', message: m, ntype: 'loss' });
              window.HubStore.notifyTelegram(m);
            } else {
              this.dispatch({ type: 'ARM' });
              this.dispatch({ type: 'NOTIFY', message: `🔄 Re-armed — Differ ≠${cold} | CD: ${duration}s`, ntype: 'info' });
            }
          }
        } else {
          this.dispatch({ type: 'COOLDOWN_TICK', remaining });
        }
      }, 1000);
    }

    connectAnalysis() {
      try {
        if (this.socketP) { this.socketP.onclose = null; this.socketP.close(); }
        if (this.socketG) { this.socketG.onclose = null; this.socketG.close(); }
      } catch (e) { /* */ }
      this.tickIndex = 0;
      if (this.analysisReconnectAttempts == null) this.analysisReconnectAttempts = 0;
      const createSocket = (market, type) => {
        const ws = new WebSocket(getPublicWsUrl());
        ws.onopen = () => {
          this.analysisReconnectAttempts = 0; // reset backoff on a clean connection
          try { ws.send(JSON.stringify({ ticks: market, subscribe: 1 })); } catch (e) { /* */ }
        };
        ws.onmessage = (m) => {
          try {
            const d = JSON.parse(m.data);
            if (d.tick) {
              const digit = parseInt(d.tick.quote.toString().slice(-1));
              if (type === 'P') { this.tickIndex++; this.dispatch({ type: 'TICK_P', digit }); }
              else this.dispatch({ type: 'TICK_G', digit });
            }
          } catch (e) { /* */ }
        };
        ws.onclose = () => {
          if (this.reconnectTimer) clearTimeout(this.reconnectTimer);
          // Capped exponential backoff (3s → 30s max) instead of a flat 3s
          // retry forever — avoids hammering Deriv's servers during a real
          // outage while still recovering quickly from brief blips.
          this.analysisReconnectAttempts = (this.analysisReconnectAttempts || 0) + 1;
          const delay = Math.min(3000 * Math.pow(1.6, this.analysisReconnectAttempts - 1), 30000);
          this.reconnectTimer = setTimeout(() => this.connectAnalysis(), delay);
        };
        return ws;
      };
      this.socketP = createSocket(this.state.primaryMarket, 'P');
      this.socketG = createSocket(this.state.globalMarket, 'G');
    }

    authenticate() {
      const token = window.HubStore.getState().apiToken;
      if (!token) return;
      this.dispatch({ type: 'SET_CONNECTION_STATUS', status: 'connecting' });
      try { if (this.socketT) { this.socketT.onclose = null; this.socketT.close(); } } catch (e) { /* */ }

      // 2026 Deriv API: REST OTP → authenticated WebSocket URL
      const _self = this;
      (async () => {
        const hub = window.HubStore.getState();
        const appId = hub.appId || '33ADPhDZXR2F60qhPudXB';
        const headers = { 'Authorization': `Bearer ${token}`, 'Deriv-App-ID': appId, 'Content-Type': 'application/json' };

        // Resolve accountId
        let accountId = hub.accountId;
        if (!accountId) {
          try {
            const r = await fetch('https://api.derivws.com/trading/v1/options/accounts', { headers });
            if (!r.ok) throw new Error(`Accounts ${r.status}`);
            const d = await r.json();
            const accounts = d.data || [];
            const preferred = hub.accountType === 'real'
              ? accounts.find(a => !a.is_virtual) || accounts[0]
              : accounts.find(a => a.is_virtual) || accounts[0];
            if (!preferred) throw new Error('No accounts found');
            accountId = preferred.account_id;
          } catch (e) {
            _self.dispatch({ type: 'SET_CONNECTION_STATUS', status: 'disconnected' });
            _self.dispatch({ type: 'NOTIFY', message: `Auth error: ${e.message}`, ntype: 'loss' });
            return;
          }
        }

        // Get OTP WebSocket URL
        let wsUrl;
        try {
          const r = await fetch(`https://api.derivws.com/trading/v1/options/accounts/${accountId}/otp`, { method: 'POST', headers });
          if (!r.ok) throw new Error(`OTP ${r.status}`);
          const d = await r.json();
          wsUrl = d.data?.url;
          if (!wsUrl) throw new Error('No WS URL in OTP response');
        } catch (e) {
          _self.dispatch({ type: 'SET_CONNECTION_STATUS', status: 'disconnected' });
          _self.dispatch({ type: 'NOTIFY', message: `Auth error: ${e.message}`, ntype: 'loss' });
          return;
        }

        const ws = new WebSocket(wsUrl);
        _self.socketT = ws;

        ws.onerror = () => {
          _self.dispatch({ type: 'NOTIFY', message: 'Could not reach Deriv\'s servers.', ntype: 'loss' });
        };
        ws.onopen = () => {
          _self._authDelay = 8000;
          const bal = window.HubStore.getState().balanceUSD || 0;
          _self.dispatch({ type: 'AUTHENTICATED', balance: bal });
          _self.dispatch({ type: 'NOTIFY', message: '✓ SYNCHRONIZED — System Online', ntype: 'info' });
          try {
            ws.send(JSON.stringify({ proposal_open_contract: 1, subscribe: 1 }));
            ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
          } catch (e) { /* */ }
        };
        ws.onmessage = (m) => {
          try {
            const d = JSON.parse(m.data);
            if (d.msg_type === 'balance' && d.balance) {
              const bal = parseFloat(d.balance.balance);
              if (!isNaN(bal)) _self.dispatch({ type: 'UPDATE_BALANCE', balance: bal });
            }
            if (d.msg_type === 'proposal_open_contract') {
              const c = d.proposal_open_contract;
              if (c && c.is_sold) {
                const balAfter = parseFloat(c.balance_after);
                if (!isNaN(balAfter)) _self.dispatch({ type: 'UPDATE_BALANCE', balance: balAfter });
                if (!c.contract_id || !_self.ownContractIds.has(c.contract_id)) return;
                _self.ownContractIds.delete(c.contract_id);
                const isWin = c.status === 'won';
                const profit = parseFloat(c.profit) || 0;
                const exit = c.exit_tick_display_value?.toString().slice(-1);
                const entryRaw = c.entry_tick_display_value?.toString().slice(-1);
                const entryDigit = entryRaw !== undefined && entryRaw !== '' ? parseInt(entryRaw) : null;
                // Parse exit digit correctly: '0' is valid, only use null when missing
                const exitDigitParsed = (exit !== undefined && exit !== '' && exit !== '?') ? parseInt(exit) : null;
                _self.dispatch({
                  type: 'ADD_JOURNAL',
                  entry: {
                    id: Date.now().toString() + Math.random().toString(36).slice(2, 5),
                    time: new Date().toLocaleTimeString(), ts: Date.now(), type: isWin ? 'win' : 'loss', botId: 'differ',
                    barrier: c.barrier ?? 0, exitDigit: exitDigitParsed, profit, entryDigit,
                    market: c.underlying || _self.state.primaryMarket, stake: parseFloat(c.buy_price) || _self.state.stake,
                  },
                });
                const tradeMsg = `${isWin ? '✓ WIN' : '✗ LOSS'} | B:${c.barrier} E:${exit} | ${profit >= 0 ? '+' : ''}${profit.toFixed(2)}`;
                _self.dispatch({ type: 'NOTIFY', message: tradeMsg, ntype: isWin ? 'win' : 'loss' });
                const cs = _self.state;
                const tgMsg = `${isWin ? '✅' : '❌'} ${tradeMsg}\n💰 Balance: ${(isNaN(balAfter) ? cs.balanceUSD : balAfter).toFixed(2)} | Net P/L: ${cs.totalProfit.toFixed(2)}`;
                window.HubStore.notifyTelegram(tgMsg);
                if (isWin) audio.win();
                else {
                  audio.loss();
                  if (_self.state.abortOnLoss && _self.state.isRunning) {
                    _self.abortFlag = true; audio.abort();
                    _self.dispatch({ type: 'NOTIFY', message: '⛔ ABORT triggered — loss detected', ntype: 'loss' });
                  }
                }
              }
            }
            if (d.msg_type === 'buy') {
              if (d.error) {
                _self.dispatch({ type: 'NOTIFY', message: `Buy error: ${d.error.message} (code: ${d.error.code})`, ntype: 'loss' });
              }
              else if (d.buy && d.buy.contract_id) _self.ownContractIds.add(d.buy.contract_id);
            }
          } catch (e) { /* */ }
        };
        ws.onclose = () => {
          _self.dispatch({ type: 'SET_CONNECTION_STATUS', status: 'disconnected' });
          if (window.HubStore.getState().apiToken) {
            _self._authDelay = Math.min((_self._authDelay || 8000) * 1.5, 60000);
            setTimeout(() => _self.authenticate(), _self._authDelay);
          }
        };
      })();
    }

    _showDifferCooldownOverlay(duration) {
      const root = document.getElementById('differ-root');
      if (!root) return;
      let overlay = root.querySelector('.titan-cd-overlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.className = 'titan-cd-overlay';
        root.appendChild(overlay);
      }
      overlay.innerHTML = `
        <div class="titan-cd-popup">
          <div class="titan-cd-ring">
            <svg class="titan-cd-svg" viewBox="0 0 160 160">
              <circle class="titan-cd-track" cx="80" cy="80" r="66" fill="none" stroke-width="7"/>
              <circle class="titan-cd-arc" cx="80" cy="80" r="66" fill="none" stroke-width="7"
                stroke-dasharray="${(2*Math.PI*66).toFixed(1)}" stroke-dashoffset="0"
                style="transition:stroke-dashoffset 1s linear;transform:rotate(-90deg);transform-origin:80px 80px"/>
            </svg>
            <div class="titan-cd-num" id="differ-cd-popup-num">${duration}</div>
          </div>
          <div class="titan-cd-title">COOLING DOWN</div>
          <div class="titan-cd-sub">⚡ Re-analyzing digit patterns…</div>
        </div>`;
      overlay.style.display = 'flex';
      // Start arc animation draining over duration
      const arc = overlay.querySelector('.titan-cd-arc');
      if (arc) {
        const total = 2 * Math.PI * 66;
        arc.style.strokeDashoffset = '0';
        setTimeout(() => {
          arc.style.strokeDashoffset = total.toFixed(1);
          arc.style.transition = `stroke-dashoffset ${duration}s linear`;
        }, 50);
      }
    }

    _updateDifferCooldownOverlay(remaining) {
      const root = document.getElementById('differ-root');
      if (!root) return;
      const numEl = root.querySelector('#differ-cd-popup-num');
      if (numEl) numEl.textContent = Math.max(0, remaining);
    }

    _hideDifferCooldownOverlay() {
      const root = document.getElementById('differ-root');
      if (!root) return;
      const overlay = root.querySelector('.titan-cd-overlay');
      if (overlay) {
        overlay.style.opacity = '0';
        setTimeout(() => { overlay.style.display = 'none'; overlay.style.opacity = ''; }, 400);
      }
    }

    armSystem() {
      const s = this.state;
      if (!window.HubStore.isBotEnabled('differ')) { this.dispatch({ type: 'NOTIFY', message: 'Differ bot is disabled — enable it from the Dashboard first', ntype: 'loss' }); return; }
      if (!s.isAuthenticated) { this.dispatch({ type: 'NOTIFY', message: 'Add your API token in Settings first', ntype: 'loss' }); return; }
      if (s.coldDigit === null) { this.dispatch({ type: 'NOTIFY', message: 'Waiting for analysis — cold digit not yet determined', ntype: 'info' }); return; }
      this.dispatch({ type: 'ARM' });
      this.dispatch({ type: 'NOTIFY', message: `⚡ BOLT ARMED — Differ ≠${s.coldDigit} | Trigger at ${s.silenceTrigger}`, ntype: 'info' });
    }

    disarmSystem() {
      this.dispatch({ type: 'DISARM' });
      this.abortFlag = true;
      if (this.cooldownTimer) { clearInterval(this.cooldownTimer); this.cooldownTimer = null; }
      this.dispatch({ type: 'COOLDOWN_END' });
    }

    abortTrades() {
      this.abortFlag = true; audio.abort();
      this.dispatch({ type: 'NOTIFY', message: '⛔ MANUAL ABORT — Stopping all trades', ntype: 'loss' });
    }
  }

  window.BenzEngine = BenzEngine;
  window.BenzConstants = { MARKETS, getGlobalMarket };
})();
</script>
<script>(function (global) {

  function setHtmlIfChanged(node, html) {
    if (!node) return false;
    if (node.__lastHtml === html) return false;
    node.innerHTML = html;
    node.__lastHtml = html;

  global.setHtmlIfChanged = setHtmlIfChanged;

  let shellBuilt = false;

  function buildShell(root) {

    root.innerHTML = `

          <div style="display:flex;border-bottom:1px solid hsl(var(--border)/0.4)">
            <button class="differ-subtab font-display active" data-tab="journal" style="flex:1;padding:8px;font-size:10px;letter-spacing:2px;background:none;border:none;color:hsl(var(--primary));cursor:pointer">JOURNAL</button>
            <button class="differ-subtab font-display" data-tab="lab" style="flex:1;padding:8px;font-size:10px;letter-spacing:2px;background:none;border:none;color:hsl(var(--muted-foreground));cursor:pointer">🧪 LAB</button>
          </div>
          <div class="benz-scroll" id="differ-right"></div>
        </div>
      </div>
      <div class="glass-monitor" id="differ-statusbar" style="text-align:center;padding:10px;font-family:monospace;font-size:13px;border-top:1px solid hsl(var(--border)/0.5);border-radius:0;flex-shrink:0"></div>`;

    root.querySelectorAll('.differ-subtab').forEach((btn) => {

        renderRight(global.benzEngine.state, btn.dataset.tab);
      };

    shellBuilt = true;
    renderCenterConfig(global.benzEngine.state);
  }

  function renderLeft(s) {
    const maxP = Math.max(...s.freqP.map((f) => f.count), 1);
    const nonZero = s.freqP.filter((f) => f.digit !== 0);
    const sorted = [...nonZero].sort((a, b) => a.count - b.count);
    const syncP = Math.min(100, (s.historyP.length / 100) * 100);
    const silentPct = s.silenceTrigger ? Math.min(100, (s.silenceCount / s.silenceTrigger) * 100) : 0;
    const silentClass = s.silenceCount >= s.silenceTrigger ? 'neon-text-win' : s.silenceCount >= s.silenceTrigger * 0.7 ? 'neon-text-accent' : '';

    el('differ-left').innerHTML = `
      <div class="section-divider neon-text-secondary"><span>● Analysis Engine</span></div>

        </div>
        <div class="bar-track"><div class="bar-fill-cyan" style="width:${syncP}%"></div></div>
      </div>
      <div class="glass-panel" style="padding:10px;margin-bottom:8px">
        <div style="font-size:9px;margin-bottom:6px">GLOBAL: ${s.globalMarket} · ${s.historyG.length} ticks</div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px">
          ${s.freqG.map((f) => `<div class="digit-cell ${f.digit === 0 ? 'is-zero' : ''}"><div class="font-display" style="font-weight:700">${f.digit}</div><div style="font-size:7px">${f.count}</div></div>`).join('')}

      </div>

        ${s.coldDigit !== null ? `<div style="font-size:8px;margin-top:8px">Watching <span class="neon-text-primary">≠${s.coldDigit}</span>${s.thirdColdDigit !== null ? ` + alt <span class="neon-text-accent">${s.thirdColdDigit}</span>` : ''}</div>` : ''}

  function renderCenterConfig(s) {
