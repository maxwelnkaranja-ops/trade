/* ── BUTTONS — PREMIUM ── */
.btn-primary {
  border-radius: 10px !important;
  font-size: 11px !important;
  letter-spacing: 0.5px !important;
  box-shadow: 0 0 20px hsl(var(--primary)/0.25), inset 0 1px 0 hsl(0 0% 100% / 0.15) !important;
}
.btn-primary:hover {
  transform: translateY(-2px) !important;
  box-shadow: 0 0 40px hsl(var(--primary)/0.4) !important;
}

/* ── TOGGLE SWITCHES — PREMIUM ── */
.toggle {
  position: relative;
  width: 42px !important;
  height: 24px !important;
  border-radius: 999px !important;
  background: hsl(var(--muted)) !important;
  border: 1px solid hsl(var(--border)) !important;
  cursor: pointer;
  transition: all 0.25s var(--ease) !important;
  outline: none;
}
.toggle.on {
  background: linear-gradient(135deg, hsl(var(--primary)), hsl(var(--primary-2))) !important;
  border-color: hsl(var(--primary)/0.5) !important;
  box-shadow: 0 0 16px hsl(var(--primary)/0.35) !important;
}

/* ── LIVE BADGE — NEON GLOW ── */
.hub-live-badge {
  border-radius: 999px !important;
  font-size: 9px !important;
  letter-spacing: 2px !important;
  transition: all 0.3s var(--ease) !important;
}
.hub-live-badge.connected {
  box-shadow: 0 0 20px hsl(var(--win)/0.2), 0 0 0 1px hsl(var(--win)/0.25) !important;
}

/* ── BOT TOGGLE CHIPS — UPGRADE ── */
.bot-toggle-chip {
  border-radius: 999px !important;
  padding: 5px 12px 5px 8px !important;
  font-size: 10.5px !important;
  transition: all 0.2s var(--ease) !important;
}
.bot-toggle-chip.on {
  box-shadow: 0 0 12px hsl(var(--win)/0.2) !important;
}

/* ── DASH BODY LAYOUT ── */
.dash-body {
  grid-template-columns: 1fr 320px !important;
  gap: 14px !important;
}

/* ── GLASS MONITOR (digit pads) ── */
.glass-monitor {
  border-radius: 12px !important;
}

/* ── INPUT FIELDS — PREMIUM ── */
.input-field, .titan-input, .terminal-input, .terminal-select {
  border-radius: 10px !important;
  background: hsl(var(--bg)) !important;
  transition: all 0.2s var(--ease) !important;
}
.input-field:focus, .titan-input:focus {
  box-shadow: 0 0 0 3px hsl(var(--primary)/0.15), 0 0 20px hsl(var(--primary)/0.08) !important;
}

/* ── DASH MASTER TP/SL inputs — enhanced ── */
#dash-master-tp {
  border-radius: 10px !important;
  transition: box-shadow 0.2s !important;
}
#dash-master-tp:focus {
  box-shadow: 0 0 0 3px hsl(var(--win)/0.2), 0 0 16px hsl(var(--win)/0.15) !important;
}
#dash-master-sl {
  border-radius: 10px !important;
  transition: box-shadow 0.2s !important;
}
#dash-master-sl:focus {
  box-shadow: 0 0 0 3px hsl(var(--loss)/0.2), 0 0 16px hsl(var(--loss)/0.15) !important;
}

/* ── SCROLLBARS — CUSTOM ── */
*::-webkit-scrollbar { width: 4px; height: 4px; }
*::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, hsl(var(--primary)/0.3), hsl(var(--secondary)/0.2)) !important;
  border-radius: 4px !important;
}
*::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, hsl(var(--primary)/0.5), hsl(var(--secondary)/0.4)) !important;
}

/* ── BALANCE PILL — PREMIUM ── */
.hub-balance-pill {
  border-radius: 999px !important;
  animation: glow-pulse-blue 3s ease-in-out infinite;
}

/* ── ENGINE OVERVIEW SECTION ── */
.rank-table {
  display: grid !important;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)) !important;
  gap: 10px !important;
}

/* ── JOURNAL TABS ROW ── */
.journal-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
}

/* ── EXEC LIST ITEMS ANIMATION ── */
.exec-list > * {
  animation: slide-in-up 0.3s var(--ease) both;
}
.exec-list > *:nth-child(1) { animation-delay: 0.05s; }
.exec-list > *:nth-child(2) { animation-delay: 0.10s; }
.exec-list > *:nth-child(3) { animation-delay: 0.15s; }
.exec-list > *:nth-child(4) { animation-delay: 0.20s; }

/* ── RESPONSIVE TWEAKS ── */
@media (max-width: 1100px) {
  .dash-body { grid-template-columns: 1fr !important; }
  .dash-stats-row { grid-template-columns: repeat(2, 1fr) !important; }
}
@media (max-width: 640px) {
  .dash-scroll { padding: 12px 14px !important; }
  .stat-card-value { font-size: 1.4rem !important; }
}

/* ── PARTICLES (CSS only, positioned via nth-child tricks) ── */
.hub-shell > aside::before {
  content: '';
  position: absolute;
  bottom: 20%; left: 30%;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: hsl(var(--primary)/0.6);
  box-shadow: 0 0 6px hsl(var(--primary)/0.8);
  animation: float-particle 5s ease-in-out infinite;
}
.hub-shell > aside .hub-tabs::before {
  content: '';
  position: absolute;
  bottom: 40%; left: 60%;
  width: 1.5px; height: 1.5px;
  border-radius: 50%;
  background: hsl(var(--secondary)/0.5);
  box-shadow: 0 0 5px hsl(var(--secondary)/0.8);
  animation: float-particle 7s 1.5s ease-in-out infinite;
  pointer-events: none;
}

/* ── GLASS CARD GLOW — UPGRADE ── */
.glass-card-glow {
  border-radius: 16px !important;
}

/* ── ACTIVE TAB INDICATOR — static glow, no flicker ── */
.hub-tab .dot.live {
  animation: none !important;
  box-shadow: 0 0 6px hsl(var(--win)), 0 0 12px hsl(var(--win)/0.3) !important;
}

/* ── DASHBOARD OVERALL: STAGGER ENTRANCE ── */
.dash-stats-row .stat-card { animation: stat-rise 0.5s cubic-bezier(0.16,1,0.3,1) both; }
.dash-stats-row .stat-card:nth-child(1) { animation-delay: 0.0s; }
.dash-stats-row .stat-card:nth-child(2) { animation-delay: 0.08s; }
.dash-stats-row .stat-card:nth-child(3) { animation-delay: 0.16s; }
.dash-stats-row .stat-card:nth-child(4) { animation-delay: 0.24s; }

/* ══════════════════════════════════════════════════════════════════
   BENZ CLUB — ULTRA DARK PRO v7  "ABYSS"
   Obsidian void surfaces · deep chromatic glows · cinematic depth
   Premium terminal aesthetic — darker than dark, sharper than sharp
   ══════════════════════════════════════════════════════════════════ */

/* ── DEEPER BLACK ROOT OVERRIDES ── */
:root, .dark {
  --bg:         0 0% 0% !important;
  --bg-soft:    240 8% 2.2% !important;
  --card:       240 6% 4.5% !important;
  --card-2:     240 6% 7% !important;
  --border:     240 6% 9% !important;
  --border-bright: 240 6% 16% !important;
  --muted:      240 5% 7% !important;
  --muted-foreground: 240 4% 42% !important;
  --foreground: 220 18% 94% !important;

  /* Richer accent palette */
  --primary:    232 95% 64% !important;
  --primary-2:  258 88% 60% !important;
  --secondary:  195 100% 54% !important;
  --accent:     232 95% 64% !important;
  --win:        155 72% 46% !important;
  --loss:       350 84% 58% !important;

  /* Stronger shadows for deeper depth */
  --shadow-sm:  0 1px 4px hsl(0 0% 0% / 0.8) !important;
  --shadow-md:  0 8px 32px hsl(0 0% 0% / 0.85), 0 2px 8px hsl(0 0% 0% / 0.6) !important;
  --shadow-lg:  0 24px 64px hsl(0 0% 0% / 0.9), 0 6px 20px hsl(0 0% 0% / 0.7) !important;
  --glow-gold:  0 0 0 1px hsl(var(--primary) / .2), 0 8px 32px hsl(var(--primary) / .15) !important;
  --glow-win:   0 0 20px hsl(var(--win) / .4) !important;
  --glow-loss:  0 0 20px hsl(var(--loss) / .4) !important;
}

/* ── NEW KEYFRAMES (ultra dark edition) ── */
@keyframes aurora-shift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes void-breathe {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50%       { opacity: 0.7; transform: scale(1.05); }
}
@keyframes neon-border-pulse {
  0%, 100% { box-shadow: 0 0 0 1px hsl(var(--primary)/0.15) inset, 0 0 20px hsl(var(--primary)/0.05); }
  50%       { box-shadow: 0 0 0 1px hsl(var(--primary)/0.35) inset, 0 0 40px hsl(var(--primary)/0.12); }
}
@keyframes data-flash {
  0%   { color: hsl(var(--win)); text-shadow: 0 0 20px hsl(var(--win)/0.8); }
  100% { color: inherit; text-shadow: none; }
}
@keyframes corner-glow {
  0%, 100% { opacity: 0.3; }
  50%       { opacity: 0.8; }
}
@keyframes status-flicker {
  0%, 96%, 100% { opacity: 1; }
  97%           { opacity: 0.6; }
  98%           { opacity: 1; }
  99%           { opacity: 0.7; }
}
@keyframes deep-pulse {
  0%, 100% { box-shadow: 0 0 30px hsl(var(--primary)/0.15), 0 0 80px hsl(var(--primary)/0.04); }
  50%       { box-shadow: 0 0 60px hsl(var(--primary)/0.3),  0 0 120px hsl(var(--primary)/0.08); }
}
@keyframes card-ambient {
  0%, 100% { background-position: 0% 0%; }
  50%       { background-position: 100% 100%; }
}
@keyframes orb-drift {
  0%   { transform: translate(0, 0) scale(1); }
  33%  { transform: translate(30px, -20px) scale(1.08); }
  66%  { transform: translate(-20px, 15px) scale(0.96); }
  100% { transform: translate(0, 0) scale(1); }
}
@keyframes terminal-cursor {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}
@keyframes stat-value-in {
  from { opacity: 0; transform: translateY(8px) scale(0.94); filter: blur(6px); }
  to   { opacity: 1; transform: translateY(0) scale(1);    filter: blur(0); }
}
@keyframes bot-card-glow {
  0%, 100% { box-shadow: 0 4px 20px hsl(0 0% 0% / 0.6), 0 0 0 1px hsl(var(--border)); }
  50%       { box-shadow: 0 8px 40px hsl(0 0% 0% / 0.8), 0 0 0 1px hsl(var(--primary)/0.12); }
}

/* ── ULTRA DARK BODY + AMBIENT ORBS ── */
html, body {
  background: #000 !important;
}
body {
  background: #000000 !important;
}

/* Deep ambient orbs — the soul of the aesthetic */
.hub-shell::before {
  background:
    radial-gradient(ellipse 50% 35% at 5% 0%,   hsl(232 95% 64% / 0.10) 0%, transparent 60%),
    radial-gradient(ellipse 35% 25% at 95% 8%,  hsl(195 100% 54% / 0.07) 0%, transparent 55%),
    radial-gradient(ellipse 45% 30% at 50% 105%, hsl(258 88% 60% / 0.08) 0%, transparent 55%),
    radial-gradient(ellipse 30% 20% at 80% 90%,  hsl(155 72% 46% / 0.05) 0%, transparent 50%)
    !important;
  animation: void-breathe 12s ease-in-out infinite !important;
}

/* ── ABSOLUTE BLACK BODY GRID — subtle, not overpowering ── */
body::before {
  background-image:
    linear-gradient(hsl(240 6% 14% / 0.035) 1px, transparent 1px),
    linear-gradient(90deg, hsl(240 6% 14% / 0.035) 1px, transparent 1px) !important;
  background-size: 48px 48px !important;
  animation: bg-grid-shift 12s linear infinite, grid-pulse 6s ease-in-out infinite !important;
}

/* ── SIDEBAR — ABYSS EDITION ── */
.hub-sidebar {
  background: linear-gradient(180deg,
    hsl(240 8% 2.5% / 0.99) 0%,

  border-right: 1px solid hsl(240 6% 9%) !important;
  box-shadow:
    1px 0 0 hsl(240 6% 12%),
    6px 0 60px hsl(0 0% 0% / 0.7) !important;
}
.hub-sidebar::after {
  background: linear-gradient(180deg,
    transparent 0%,

/* ── BRAND — PREMIUM CRYSTAL LOGO ── */
.hub-brand-avatar {

    hsl(258 88% 60%),
    hsl(195 100% 54%)) !important;

  box-shadow:
    0 0 0 1px hsl(232 95% 64% / 0.5),
    0 0 30px hsl(232 95% 64% / 0.4),

.hub-brand-name {

    hsl(220 18% 94%),

  -webkit-text-fill-color: transparent !important;
  background-clip: text !important;

.hub-tab {

}
.hub-tab:hover:not(.active) {

.hub-nav-label {
  color: hsl(240 4% 28%) !important;

}

/* ── TOPBAR — VOID BLACK ── */
.hub-header {

}
.hub-header::after {

.hub-clock {

.hub-breadcrumb { color: hsl(240 4% 35%) !important; }

/* ── LIVE BADGE — NEON SIGNAL ── */
.hub-live-badge {

.hub-live-badge.connected {

  border-color: hsl(155 72% 46% / 0.22) !important;

/* ── SETTINGS BUTTON — VOID GLASS ── */
.hub-settings-btn {
  background: hsl(240 8% 3.5%) !important;
  border: 1px solid hsl(240 6% 10%) !important;

}
.hub-settings-btn:hover {
  background: hsl(240 6% 6%) !important;

}

/* ── DASHBOARD SCROLL ── */
.dash-scroll {
  background: #000 !important;
  padding: 14px 16px !important;
  gap: 14px !important;
  overflow-y: auto !important;
}

/* ── HERO — CINEMATIC ── */
.dash-hero-title {
  font-size: 2.5rem !important;
  font-weight: 900 !important;
  background: linear-gradient(135deg,
    hsl(220 18% 96%) 0%,
    hsl(232 95% 76%) 45%,
    hsl(195 100% 66%) 100%) !important;
  -webkit-background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  background-clip: text !important;

}

}
.dash-hero-subtitle {

  font-size: 9px !important;

  margin-top: 5px !important;
}

/* ── MASTER CONTROL — DEEP GLASS ── */
#dash-master-panel {
  background: linear-gradient(135deg,
    hsl(232 95% 64% / 0.09),
    hsl(258 88% 60% / 0.06),
    hsl(195 100% 54% / 0.04)) !important;
  border: 1px solid hsl(232 95% 64% / 0.2) !important;
  border-radius: 18px !important;
  box-shadow:
    0 0 0 1px hsl(232 95% 64% / 0.06) inset,
    0 12px 48px hsl(0 0% 0% / 0.6),
    0 0 80px hsl(232 95% 64% / 0.04) !important;
  animation: neon-border-pulse 4s ease-in-out infinite !important;
}
#dash-master-toggle {
  background: linear-gradient(135deg,
    hsl(232 95% 60%),
    hsl(258 88% 56%),
    hsl(195 100% 50%)) !important;
  background-size: 200% 200% !important;
  animation: aurora-shift 3s ease-in-out infinite !important;
  border-radius: 12px !important;
  box-shadow:
    0 0 40px hsl(232 95% 64% / 0.5),

  box-shadow:

    inset 0 1px 0 hsl(0 0% 100% / 0.3) !important;

/* ── STAT CARDS — ABYSS CRYSTALS ── */
.stat-card {
  background: hsl(240 6% 4.5%) !important;
  border: 1px solid hsl(240 6% 9%) !important;
  border-radius: 18px !important;
  box-shadow:
    0 4px 24px hsl(0 0% 0% / 0.7),
    inset 0 1px 0 hsl(0 0% 100% / 0.025) !important;
  position: relative !important;
  overflow: hidden !important;
}
/* Ambient corner light */
.stat-card::before {
  content: '' !important;
  position: absolute !important;
  top: 0 !important; left: 0 !important; right: 0 !important;
  height: 1px !important;
  background: linear-gradient(90deg,
    transparent 0%,
    hsl(232 95% 64% / 0.4) 50%,
    transparent 100%) !important;
  opacity: 0 !important;
  transition: opacity 0.3s !important;
}
.stat-card::after {
  content: '' !important;
  position: absolute !important;
  top: -60% !important; right: -30% !important;
  width: 90% !important; height: 90% !important;
  background: radial-gradient(ellipse, hsl(232 95% 64% / 0.05) 0%, transparent 70%) !important;
  pointer-events: none !important;
  opacity: 0 !important;
  transition: opacity 0.3s !important;
}
.stat-card:hover {
  background: hsl(240 6% 5.5%) !important;
  border-color: hsl(232 95% 64% / 0.22) !important;
  transform: translateY(-5px) !important;
  box-shadow:
    0 16px 50px hsl(0 0% 0% / 0.75),
    0 0 0 1px hsl(232 95% 64% / 0.1),
    inset 0 1px 0 hsl(232 95% 64% / 0.08) !important;
}
.stat-card:hover::before { opacity: 1 !important; }
.stat-card:hover::after  { opacity: 1 !important; }
.stat-card-value {
  font-size: 2rem !important;
  font-weight: 900 !important;
  letter-spacing: -0.04em !important;
  animation: stat-value-in 0.5s cubic-bezier(0.16,1,0.3,1) both !important;
}
.stat-card-label {
  color: hsl(240 4% 38%) !important;
  font-size: 8.5px !important;
  letter-spacing: 3px !important;
  font-weight: 800 !important;
}
.stat-card-icon {
  width: 34px !important;
  height: 34px !important;
  border-radius: 10px !important;
  box-shadow: 0 4px 14px hsl(0 0% 0% / 0.5) !important;
}
.stat-card-sub {
  color: hsl(240 4% 36%) !important;
  font-size: 10px !important;
  letter-spacing: 0.3px !important;

/* ── GLASS PANELS — DEEP VOID ── */

  border: 1px solid hsl(240 6% 9%) !important;
  border-radius: 18px !important;
  box-shadow:

}
.glass-panel-glow {
  background: hsl(240 6% 4.5%) !important;

}

/* ── EQUITY PANEL ── */
.dash-equity-panel {

  overflow: hidden !important;
}
.dash-equity-panel::after {
  content: '' !important;
  position: absolute !important;
  top: -30% !important; right: -10% !important;

  background: radial-gradient(ellipse, hsl(155 72% 46% / 0.04) 0%, transparent 70%) !important;

}

/* ── BOT CARDS — DEEP PANELS ── */
.bot-card {
  background: hsl(240 6% 4.5%) !important;
  border: 1px solid hsl(240 6% 10%) !important;
  border-radius: 14px !important;

  overflow: hidden !important;
}
.bot-card::before {
  content: '' !important;
  position: absolute !important;
  bottom: 0 !important; left: 0 !important; right: 0 !important;
  height: 2px !important;
  background: linear-gradient(90deg,
    hsl(232 95% 64% / 0.4),
    hsl(195 100% 54% / 0.3)) !important;
  opacity: 0 !important;
  transition: opacity 0.25s !important;
}
.bot-card:hover {
  background: hsl(240 6% 5.5%) !important;
  border-color: hsl(232 95% 64% / 0.18) !important;
  transform: translateY(-4px) !important;
  box-shadow: 0 12px 40px hsl(0 0% 0% / 0.75) !important;
  animation: bot-card-glow 0.3s ease forwards !important;
}

.bot-card-head {
  font-size: 9.5px !important;
  letter-spacing: 1.5px !important;
  color: hsl(240 4% 48%) !important;
  margin-bottom: 2px !important;
}
.bot-card-value {

}
.bot-card-dot {
  width: 6px !important; height: 6px !important;
  box-shadow: 0 0 8px currentColor !important;
}
.bar-track {
  background: hsl(240 6% 8%) !important;
  height: 3px !important;
  border-radius: 3px !important;
}
.bar-fill-win {
  background: linear-gradient(90deg,
    hsl(155 72% 46%),
    hsl(195 100% 54%)) !important;
  box-shadow: 0 0 10px hsl(155 72% 46% / 0.6) !important;
}

/* ── EXEC PANEL ── */
.exec-panel {

  border-radius: 18px !important;

}

}

/* ── BUTTONS — DEEP GLOW ── */

/* ── MODAL — VOID LUXURY ── */
.modal-overlay {

}

.settings-section {

}

}

    0 0 20px hsl(232 95% 64% / 0.4),

}

}

}

.hub-balance-pill {
  background: hsl(155 72% 46% / 0.08) !important;

}

/* ── P&L BADGE ── */
.pnl-badge.pos { background: hsl(155 72% 46% / 0.1) !important; box-shadow: 0 0 10px hsl(155 72% 46% / 0.15) !important; }

}
.live-tick-cell:hover {

/* ── BENZ COL (3-column trading desk) ── */
.benz-col {
  background: hsl(240 6% 4%) !important;

.signal-chip.buy {
  background: hsl(155 72% 46% / 0.1) !important;

/* ── Full Automation Toggle ──────────────────────────────────────── */
.dash-auto-toggle {
  width: 34px; height: 18px; border-radius: 999px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  position: relative; cursor: pointer; transition: background .22s, border-color .22s, box-shadow .22s;
  flex-shrink: 0;
}
.dash-auto-toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px; border-radius: 50%;
  background: rgba(150,160,185,0.55);
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), background .22s;
}
.dash-auto-toggle.on {
  background: hsl(var(--primary) / .18);
  border-color: hsl(var(--primary) / .5);
  box-shadow: 0 0 14px hsl(var(--primary) / .35);
}
.dash-auto-toggle.on::after {
  transform: translateX(16px);
  background: hsl(var(--primary));
  box-shadow: 0 0 8px hsl(var(--primary) / .8);
}
@keyframes cooldown-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
html body #panel-dashboard .exec-cd-bar {
  height: 3px !important; border-radius: 999px !important;
  background: rgba(255,170,0,0.12) !important; overflow: hidden !important;
}
html body #panel-dashboard .exec-cd-fill {
  height: 100% !important; border-radius: 999px !important;
  background: linear-gradient(90deg, #ffaa00, #ff6600) !important;
  box-shadow: 0 0 8px rgba(255,170,0,0.5) !important;
  width: 100% !important;
}
@keyframes exec-cd-drain { from { width: 100%; } to { width: 0%; } }

/* ── Dashboard circular CD ring ── */
.exec-cd-ring-wrap {
  position: relative; display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; flex-shrink: 0;
}
.exec-cd-ring-svg { position: absolute; inset: 0; }
.exec-cd-ring-track { stroke: rgba(255,170,0,0.15); }
.exec-cd-ring-arc {

  filter: drop-shadow(0 0 5px rgba(255,170,0,0.7));
}
.exec-cd-ring-num {
  position: relative; z-index: 1;

  color: #ffaa00; letter-spacing: -0.5px; line-height: 1;

/* ── Live Entry Conditions Panel ── */
.entry-conditions-panel {
  background: linear-gradient(135deg, hsl(var(--card)), hsl(var(--bg)));
  border: 1px solid hsl(var(--border));
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.entry-conditions-panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, hsl(var(--primary)/0.6), hsl(var(--secondary)/0.4), transparent);
  transition: background 0.4s;
}
.entry-conditions-panel.all-met::before {
  background: linear-gradient(90deg, hsl(var(--win)), hsl(var(--secondary)));
  box-shadow: 0 0 16px hsl(var(--win)/0.4);
  animation: cond-fire-glow 0.6s ease;
}
@keyframes cond-fire-glow {
  0%   { box-shadow: 0 0 0px hsl(var(--win)/0); }
  50%  { box-shadow: 0 0 30px hsl(var(--win)/0.8); }
  100% { box-shadow: 0 0 16px hsl(var(--win)/0.4); }
}
.entry-cond-title {
  display: flex; align-items: center; gap: 7px;
  font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 800;
  letter-spacing: 2px; text-transform: uppercase;
  color: hsl(var(--muted-foreground)); margin-bottom: 10px;
}
.entry-cond-pulse {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: hsl(var(--muted-foreground));
  transition: background 0.3s, box-shadow 0.3s;
}
.entry-cond-pulse.active {
  background: hsl(var(--win));
  box-shadow: 0 0 10px hsl(var(--win)/0.7);
  animation: pulse-dot 1.2s ease-in-out infinite;
}
.entry-cond-pulse.firing {
  background: hsl(var(--primary));
  box-shadow: 0 0 16px hsl(var(--primary)/0.9);
  animation: pulse-fire 0.4s ease-in-out infinite alternate;
}
@keyframes pulse-dot  { 0%,100% { box-shadow: 0 0 6px hsl(var(--win)/0.5); } 50% { box-shadow: 0 0 14px hsl(var(--win)/0.9); } }
@keyframes pulse-fire { 0% { box-shadow: 0 0 8px hsl(var(--primary)/0.7); } 100% { box-shadow: 0 0 24px hsl(var(--primary)); } }
.entry-cond-status {
  margin-left: auto; font-size: 8px; font-weight: 900; letter-spacing: 1.5px;
  padding: 2px 7px; border-radius: 999px;
  background: hsl(var(--muted)); color: hsl(var(--muted-foreground));
  transition: all 0.3s;
}
.entry-cond-status.met { background: hsl(var(--win)/0.15); color: hsl(var(--win)); border: 1px solid hsl(var(--win)/0.3); }
.entry-cond-status.fire { background: hsl(var(--primary)/0.2); color: hsl(var(--primary)); border: 1px solid hsl(var(--primary)/0.5); animation: shimmer-sweep 1s linear infinite; }
.entry-cond-list {
  display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px;
}
.entry-cond-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 9px; border-radius: 9px;
  background: hsl(var(--bg)); border: 1px solid hsl(var(--border));
  font-size: 10.5px; font-family: 'DM Mono', monospace;
  transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  position: relative; overflow: hidden;
}
.entry-cond-row.met {
  background: hsl(var(--win)/0.06); border-color: hsl(var(--win)/0.35);
  box-shadow: 0 0 8px hsl(var(--win)/0.1);
}
.entry-cond-row.pending {
  background: hsl(var(--primary)/0.04); border-color: hsl(var(--border));
}
.entry-cond-row.loading { opacity: 0.5; }
.entry-cond-row::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, hsl(var(--win)/0.08), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.entry-cond-row.met::after { opacity: 1; }
.entry-cond-icon { font-size: 11px; flex-shrink: 0; width: 16px; text-align: center; }
.entry-cond-label { flex: 1; color: hsl(var(--foreground)/0.8); }
.entry-cond-value {
  font-size: 9.5px; font-weight: 700; color: hsl(var(--muted-foreground));
  background: hsl(var(--bg)); padding: 1px 6px; border-radius: 5px;
  border: 1px solid hsl(var(--border)/0.5);
  min-width: 32px; text-align: center;
  transition: all 0.2s;
}
.entry-cond-row.met .entry-cond-value { color: hsl(var(--win)); border-color: hsl(var(--win)/0.3); }
.entry-cond-progress {
  height: 4px; background: hsl(var(--muted)); border-radius: 99px; overflow: hidden; margin-bottom: 5px;
}
.entry-cond-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, hsl(var(--primary)), hsl(var(--secondary)));
  transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 0 6px hsl(var(--primary)/0.5);
}
.entry-cond-fill.full {
  background: linear-gradient(90deg, hsl(var(--win)), hsl(var(--secondary)));
  box-shadow: 0 0 12px hsl(var(--win)/0.6);
}
.entry-cond-pct {
  font-size: 9px; color: hsl(var(--muted-foreground));
  font-family: 'DM Mono', monospace; text-align: right; letter-spacing: 0.5px;
}

  <div id="global-error-toast" class="global-error-toast" role="alert" aria-live="assertive"></div>
  <script>
    (function(){
      let lastShown=0;
      function showErrorToast(msg){
        const now=Date.now(); if(now-lastShown<4000)return; lastShown=now;
        const el=document.getElementById('global-error-toast'); if(!el)return;
        el.textContent='⚠ '+msg+' — reload if things look stuck.';
        el.classList.add('show'); clearTimeout(el._t);
        el._t=setTimeout(()=>el.classList.remove('show'),7000);
      }
      window.addEventListener('error',e=>showErrorToast((e?.message||'Error').slice(0,160)));
      window.addEventListener('unhandledrejection',e=>{
        const m=e?.reason?.message||String(e?.reason||'Background task failed');
        showErrorToast(m.slice(0,160));
      });
    })();
  </script>

<script>/* ============================================================
   HubStore — single source of truth for the whole site.
   One API token, one theme, one Telegram config. Every engine
   (Differ, Even, Odd, Over/Under) and the Dashboard reads from
   here instead of keeping its own copy or asking for its own key.
   ============================================================ */
(function (global) {
  'use strict';

  function load(key, fallback) {
    try { const v = localStorage.getItem(key); return v === null ? fallback : v; } catch (e) { return fallback; }
  }
  // Mirror of load(): never let a storage failure (quota exceeded, private
  // browsing restrictions, storage disabled) abort the function that calls
  // it — persistence is best-effort, but app state must always still update.
  function save(key, value) {
    try { localStorage.setItem(key, value); } catch (e) { /* storage unavailable — state still updates in-memory */ }
  }

  const listeners = new Set();
  const state = {
    apiToken: load('hub_api_token', ''),
    accountType: load('hub_account_type', 'demo'), // 'demo' or 'real'
    appId: (() => { const v = load('hub_app_id', ''); return v || '33ADPhDZXR2F60qhPudXB'; })(), // Alphanumeric App ID from developers.deriv.com — used in REST Deriv-App-ID header
    wsAppId: (() => { const v = load('hub_ws_app_id', ''); return v || '1089'; })(),             // Numeric App ID — used in wss://ws.derivws.com public/analysis sockets
    accountId: '',
    balanceUSD: 0,
    currency: 'USD',
    isAuthenticated: false,
    connectionStatus: 'disconnected', // disconnected | connecting | connected
    connectionError: '',
    theme: load('hub_theme', 'luminous'),
    telegramToken: load('hub_tg_token', ''),
    telegramChatId: load('hub_tg_chat', ''),
    telegramEnabled: load('hub_tg_enabled', 'false') === 'true',
    derivHistory: [], // past trades fetched from Deriv on connect
    // Per-bot "allowed to engage" switch. Defaults to all enabled.
    // A bot can still be armed/configured when disabled, but its engage
    // action is blocked until this is checked again.
    botEnabled: (() => {
      const defaults = { differ: true, even: true, odd: true, nexus: true };
      try {
        const saved = JSON.parse(load('hub_bot_enabled', 'null'));
        return saved ? { ...defaults, ...saved } : defaults;
      } catch (e) { return defaults; }
    })(),
  };

  // New Deriv API: REST to fetch account ID, then OTP to get authenticated WS URL.
  // App IDs from developers.deriv.com are alphanumeric (e.g. "33ADPhDZXR2F60qhPudXB").
  // PAT is used as Bearer token in REST headers.
  const API_BASE = 'https://api.derivws.com';

  function getAuthHeaders() {
    return {
      'Authorization': `Bearer ${state.apiToken}`,
      'Deriv-App-ID': state.appId,
      'Content-Type': 'application/json',
    };
  }

  // Auth handled directly in connectAccount via classic WS authorize flow

  function emit() { listeners.forEach((cb) => { try { cb(state); } catch (e) { /* */ } }); }

  function setTheme(theme) {
    state.theme = theme;
    save('hub_theme', theme);
    document.documentElement.className = theme;
    emit();
  }

  function setTelegram(token, chatId) {
    state.telegramToken = token; state.telegramChatId = chatId;
    save('hub_tg_token', token);
    save('hub_tg_chat', chatId);
    emit();
  }

  function setTelegramEnabled(on) {
    state.telegramEnabled = on;
    save('hub_tg_enabled', on.toString());
    emit();
  }

  function setAccountType(accountType) {
    state.accountType = accountType;
    save('hub_account_type', accountType);
    emit();
    connectAccount(); // reconnect to pick the right account (demo vs real)
    global.dispatchEvent(new CustomEvent('hub:account-type-changed', { detail: { accountType, appId: state.appId } }));
  }


  async function notifyTelegram(message) {
    if (!state.telegramEnabled || !state.telegramToken || !state.telegramChatId) return;
    try {
      await fetch(`https://api.telegram.org/bot${state.telegramToken}/sendMessage`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: state.telegramChatId, text: message, parse_mode: 'HTML' }),
      });
    } catch (e) { /* */ }
  }

  let statusSocket = null;
  let reconnectTimer = null;
  let reconnectDelay = 8000;

  function connectAccount() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (!state.apiToken) {
      state.isAuthenticated = false;
      state.connectionStatus = 'disconnected';
      state.connectionError = '';
      reconnectDelay = 8000;
      emit();
      return;
    }
    try { if (statusSocket) { statusSocket.onclose = null; statusSocket.close(); } } catch (e) { /* */ }
    state.connectionStatus = 'connecting';
    state.connectionError = '';
    emit();

    // 2026 Deriv API flow:
    // 1. REST POST /trading/v1/options/accounts/{accountId}/otp  → get OTP WebSocket URL
    // 2. WebSocket connect to that URL (auth is embedded, no {authorize} message needed)
    // We first fetch accounts to discover the accountId, then get the OTP.
    let pingInterval = null;

    async function connectViaOtp() {
      // Step 1: get accounts list to find the correct accountId
      let accountId = state.accountId;
      const appId = state.appId || '33ADPhDZXR2F60qhPudXB';
      const headers = { 'Authorization': `Bearer ${state.apiToken}`, 'Deriv-App-ID': appId, 'Content-Type': 'application/json' };

      if (!accountId) {
        try {
          const acctResp = await fetch('https://api.derivws.com/trading/v1/options/accounts', { headers });
          if (!acctResp.ok) {
            const err = await acctResp.json().catch(() => ({}));
            throw new Error((err.errors && err.errors[0]?.message) || `Accounts fetch failed (${acctResp.status})`);
          }
          const acctData = await acctResp.json();
          // Pick demo or real account based on accountType setting
          const accounts = acctData.data || [];
          const preferred = state.accountType === 'real'
            ? accounts.find(a => !a.is_virtual) || accounts[0]
            : accounts.find(a => a.is_virtual) || accounts[0];
          if (!preferred) throw new Error('No accounts found for this token');
          accountId = preferred.account_id;
          state.accountId = accountId;
          state.currency = preferred.currency || state.currency;
        } catch (e) {
          state.isAuthenticated = false;
          state.connectionStatus = 'disconnected';
          state.connectionError = e.message || 'Could not fetch accounts — check your token and App ID';
          emit();
          return;
        }
      }

      // Step 2: POST OTP to get authenticated WebSocket URL
      let wsUrl;
      try {
        const otpResp = await fetch(`https://api.derivws.com/trading/v1/options/accounts/${accountId}/otp`, { method: 'POST', headers });
        if (!otpResp.ok) {
          const err = await otpResp.json().catch(() => ({}));
          throw new Error((err.errors && err.errors[0]?.message) || `OTP request failed (${otpResp.status})`);
        }
        const otpData = await otpResp.json();
        wsUrl = otpData.data?.url;
        if (!wsUrl) throw new Error('No WebSocket URL in OTP response');
      } catch (e) {
        state.isAuthenticated = false;
        state.connectionStatus = 'disconnected';
        state.connectionError = e.message || 'OTP request failed — check your App ID and token scopes';
        emit();
        return;
      }

      // Step 3: Connect to the authenticated WebSocket URL
      try { if (statusSocket) { statusSocket.onclose = null; statusSocket.close(); } } catch (_) {}
      const ws = new WebSocket(wsUrl);
      statusSocket = ws;

      ws.onerror = () => {
        state.connectionError = 'WebSocket connection failed — check your internet connection.';
        emit();
      };
      ws.onopen = () => {
        reconnectDelay = 8000;
        state.isAuthenticated = true;
        state.connectionStatus = 'connected';
        state.connectionError = '';
        emit();
        // Subscribe to live balance updates + keep alive
        try {
          ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
          pingInterval = setInterval(() => {
            if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ ping: 1 }));
          }, 25000);
        } catch (e) { /* */ }
      };
      ws.onmessage = (m) => {
        try {
          const d = JSON.parse(m.data);
          if (d.msg_type === 'balance' && d.balance) {
            const bal = parseFloat(d.balance.balance);
            if (!isNaN(bal)) { state.balanceUSD = bal; state.currency = d.balance.currency || state.currency; emit(); }
          }
        } catch (e) { /* */ }
      };
      ws.onclose = () => {
        if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
        state.connectionStatus = 'disconnected';
        state.isAuthenticated = false;
        emit();
        if (state.apiToken) {
          reconnectTimer = setTimeout(connectAccount, reconnectDelay);
          reconnectDelay = Math.min(reconnectDelay * 1.5, 60000);
        }
      };
    }
    connectViaOtp();
  }

  function setToken(token) {
    state.apiToken = token;
    state.accountId = ''; // clear cached account so OTP fetch re-resolves for the new token
    save('hub_api_token', token);
    emit();
    connectAccount();
    global.dispatchEvent(new CustomEvent('hub:token-changed', { detail: { token } }));
  }

  function setAppId(appId) {
    appId = (appId || '').trim() || '33ADPhDZXR2F60qhPudXB'; // new alphanumeric format from developers.deriv.com
    state.appId = appId;
    save('hub_app_id', appId);
    emit();
    connectAccount();

(function () {
  'use strict';
  class SoundEngine {
    constructor() {
      this.audioContext = null;
      this.enabled = true;
    }
    getContext() {
      if (!this.audioContext) {
        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      // Resume if suspended (Chrome autoplay policy requires user gesture first)
      if (this.audioContext.state === 'suspended') {
        this.audioContext.resume().catch(() => {});
      }
      return this.audioContext;
    }
    // Call this on any user interaction to unlock audio
    unlock() {
      try {
        const ctx = this.getContext();
        if (ctx.state === 'suspended') ctx.resume().catch(() => {});
      } catch (e) { /* */ }
    }
    toggle(on) { this.enabled = on; }
    playTone(frequency, duration, type = 'sine', gain = 0.3) {
      if (!this.enabled) return;
      try {
        const ctx = this.getContext();
        // Chrome autoplay policy: don't attempt to play if context is still suspended
        // (no user gesture yet). The unlock() call on first click will resume it.
        if (ctx.state === 'suspended') return;
        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, ctx.currentTime);
        gainNode.gain.setValueAtTime(gain, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + duration);
      } catch (e) { /* audio unavailable */ }
    }
    playWin() {
      this.playTone(523.25, 0.1, 'sine', 0.2);
      setTimeout(() => this.playTone(659.25, 0.1, 'sine', 0.2), 100);
      setTimeout(() => this.playTone(783.99, 0.2, 'sine', 0.3), 200);
    }
    playLoss() {
      this.playTone(392, 0.15, 'sawtooth', 0.15);
      setTimeout(() => this.playTone(293.66, 0.2, 'sawtooth', 0.1), 150);
    }
    playExecute() { this.playTone(880, 0.05, 'square', 0.1); }
    playConnect() {
      this.playTone(440, 0.1, 'sine', 0.2);
      setTimeout(() => this.playTone(660, 0.1, 'sine', 0.2), 100);
      setTimeout(() => this.playTone(880, 0.15, 'sine', 0.25), 200);
    }
    playAlert() {
      this.playTone(800, 0.1, 'square', 0.15);
      setTimeout(() => this.playTone(800, 0.1, 'square', 0.15), 200);
    }
    playEngineStart() {
      for (let i = 0; i < 5; i++) setTimeout(() => this.playTone(200 + i * 100, 0.1, 'sawtooth', 0.1), i * 80);
    }
    playEngineStop() {
      for (let i = 0; i < 5; i++) setTimeout(() => this.playTone(600 - i * 100, 0.1, 'sawtooth', 0.1), i * 80);
    }
    playTick() { this.playTone(1200, 0.02, 'sine', 0.05); }
    // Differ-specific cues, merged in from the legacy per-tab AudioEngine so
    // every tab now shares ONE AudioContext + ONE mute switch instead of each
    // tab running its own isolated, unmutable audio pipeline.
    playFire() { this.playTone(1500, 0.04, 'square', 0.12); }
    playCooldown() { this.playTone(440, 0.15, 'sine', 0.18); }
    playAbort() {
      this.playTone(300, 0.1, 'square', 0.18);
      setTimeout(() => this.playTone(150, 0.12, 'square', 0.16), 90);
    }
  }
  const sharedSoundEngine = new SoundEngine();
  window.Sounds = { soundEngine: sharedSoundEngine };
  // Single AudioContext for the whole hub, exposed on window so the global
  // mute toggle in Settings can suspend/resume it directly (see
  // applyMuteState below). Lazily created on first playTone() call.
  Object.defineProperty(window, '_benzAudioCtx', {
    get() { return sharedSoundEngine.audioContext; },
    configurable: true,
  });

  // Unlock AudioContext on first user interaction (Chrome autoplay policy)
  function unlockAudio() {
    window.Sounds.soundEngine.unlock();
    document.removeEventListener('click', unlockAudio);
    document.removeEventListener('keydown', unlockAudio);
    document.removeEventListener('touchstart', unlockAudio);
  }
  document.addEventListener('click', unlockAudio);
  document.addEventListener('keydown', unlockAudio);
  document.addEventListener('touchstart', unlockAudio);
})();

<script>
(function(){
'use strict';

const exports = {};
/**
 * BENZ CLUB TITAN OMEGA ENGINE - EVEN/ODD EDITION
 * High-speed trading engine with advanced digit analysis for Even/Odd markets
 */






// Multi-timeframe analysis result




const MARKETS = [
  { symbol: "1HZ100V", name: "V100 (1S)" },
  { symbol: "1HZ75V", name: "V75 (1S)" },
  { symbol: "1HZ50V", name: "V50 (1S)" },
  { symbol: "1HZ25V", name: "V25 (1S)" },
  { symbol: "1HZ10V", name: "V10 (1S)" },
  { symbol: "R_100", name: "V100" },
  { symbol: "R_75", name: "V75" },
  { symbol: "R_50", name: "V50" },
  { symbol: "R_25", name: "V25" },
  { symbol: "R_10", name: "V10" },
];

/** Helper: is digit even */
function isEven(d) {
  return d % 2 === 0;
}

/** Helper: is digit odd */
function isOdd(d) {
  return d % 2 !== 0;
}

/**
 * ADVANCED ANALYSIS ENGINE - EVEN/ODD EDITION
 * Analyzes odd digit dominance, momentum, and trend
 */
function analyzeDigits(history, tickPeriod = 50) {
  const data = history.slice(-tickPeriod);
  
  if (data.length < 5) {
    return getEmptyAnalysis();
  }

  // Count digit frequencies
  const counts = Array(10).fill(0);
  data.forEach(d => counts[d]++);
  
  const percentages = counts.map(c => (c / data.length) * 100);
  
  // Hot/Cold detection
  const hotDigits = percentages.map((p, i) => ({ digit: i, pct: p }))
    .filter(d => d.pct > 15)
    .map(d => d.digit);
    
  const coldDigits = percentages.map((p, i) => ({ digit: i, pct: p }))
    .filter(d => d.pct < 8)
    .map(d => d.digit);

  // WEIGHTED TREND ANALYSIS - Recent ticks matter more
  // Now tracking ODD digit weight instead of over-barrier
  const recentWeight = 3;
  let weightedOddCount = 0;
  let totalWeight = 0;
  
  data.forEach((digit, index) => {
    const weight = index < data.length / 2 ? 1 : recentWeight;
    totalWeight += weight;
    if (isOdd(digit)) weightedOddCount += weight;
  });
  
  const trendScore = (weightedOddCount / totalWeight) * 100;

  // MOMENTUM SCORING - Detect momentum shifts in odd digits
  const recentSlice = data.slice(-10);
  const previousSlice = data.slice(-20, -10);
  
  const recentOddRate = recentSlice.filter(d => isOdd(d)).length / recentSlice.length;
  const previousOddRate = previousSlice.length > 0 
    ? previousSlice.filter(d => isOdd(d)).length / previousSlice.length 
    : 0.5;
  
  const momentumScore = ((recentOddRate - previousOddRate) + 1) * 50;

  // VOLATILITY INDEX - Lower is better for Odd trades
  const volatility = calculateVolatility(data);
  const volatilityIndex = Math.max(0, 100 - volatility * 10);

  // Odd digit weight (1, 3, 5, 7, 9)
  const oddDigitWeight = percentages.filter((_, i) => isOdd(i)).reduce((a, b) => a + b, 0);

  // Check conditions
  const rareDigits = coldDigits.length >= 4;
  const dominantOdd = oddDigitWeight > 55; // Relaxed from 60 since even/odd is ~50/50
  const stablePattern = data.length >= 25;
  const momentumUp = momentumScore > 55; // Relaxed since even/odd swings less
  const lowVolatility = volatilityIndex > 50;

  // CALCULATE PROBABILITY
  let probability = 0;
  
  // Base probability from odd digit weight
  probability += Math.min(30, oddDigitWeight / 2);
  
  // Trend bonus
  if (trendScore > 55) probability += 20;
  else if (trendScore > 50) probability += 10;
  
  // Momentum bonus
  if (momentumUp) probability += 15;
  
  // Stability bonus
  if (stablePattern) probability += 10;
  
  // Low volatility bonus
  if (lowVolatility) probability += 10;
  
  // Rare digits pattern bonus
  if (rareDigits) probability += 15;

  // Best barrier kept for compatibility (not used in even/odd)
  let bestBarrier = 0;

  // Get recommendation
  let recommendation = 'HOLD';
  if (probability >= 85) recommendation = 'STRONG_BUY';
  else if (probability >= 70) recommendation = 'BUY';
  else if (probability < 50) recommendation = 'AVOID';

  // Build frequencies array for renderLeft bar chart
  const frequencies = Array.from({length: 10}, (_, i) => ({
    digit: i,
    count: counts[i] || 0,
    percentage: percentages[i] || 0,
  }));

  return {
    probability: Math.min(100, Math.round(probability)),
    digitCounts: counts,
    digitPercentages: percentages,
    frequencies,
    hotDigits,
    coldDigits,
    trendScore: Math.round(trendScore),
    momentumScore: Math.round(momentumScore),
    volatilityIndex: Math.round(volatilityIndex),
    oddDigitWeight: Math.round(oddDigitWeight),
    conditions: {
      rareDigits,
      dominantOdd,
      stablePattern,
      momentumUp,
      lowVolatility,
    },
    recommendation,
    bestBarrier,
  };
}

function calculateVolatility(data) {
  if (data.length < 2) return 0;
  
  let changes = 0;
  for (let i = 1; i < data.length; i++) {
    changes += Math.abs(data[i] - data[i-1]);
  }
  
  return changes / (data.length - 1);
}

function getEmptyAnalysis() {
  return {
    probability: 0,
    digitCounts: Array(10).fill(0),
    digitPercentages: Array(10).fill(0),
    frequencies: Array.from({length: 10}, (_, i) => ({ digit: i, count: 0, percentage: 0 })),
    hotDigits: [],
    coldDigits: [],
    trendScore: 50,
    momentumScore: 50,
    volatilityIndex: 50,
    oddDigitWeight: 50,
    conditions: {
      rareDigits: false,
      dominantOdd: false,
      stablePattern: false,
      momentumUp: false,
      lowVolatility: false,
    },
    recommendation: 'HOLD',
    bestBarrier: 0,
  };
}

/**
 * MULTI-MARKET RADAR
 */
function findBestMarket(marketsData){
  const scored = marketsData
    .filter(m => m.analysis !== null)
    .map(m => ({
      ...m,
      score: calculateMarketScore(m.analysis),
    }))
    .sort((a, b) => b.score - a.score);

  return scored[0] || null;
}

function calculateMarketScore(analysis) {
  let score = analysis.probability;
  if (analysis.trendScore > 60) score += 10;
  if (analysis.momentumScore > 60) score += 10;
  if (analysis.volatilityIndex > 60) score += 5;
  return score;
}

/**
 * MULTI-TIMEFRAME ANALYSIS
 */
function analyzeMultiTimeframe(history) {
  const shortAnalysis = analyzeDigits(history, 25);
  const longAnalysis = analyzeDigits(history, 50);
  
  const shortOk = shortAnalysis.probability >= 50 && shortAnalysis.recommendation !== 'AVOID';
  const longOk = longAnalysis.probability >= 50 && longAnalysis.recommendation !== 'AVOID';
  
  const aligned = (shortOk && longOk) || 
    (shortAnalysis.recommendation === 'STRONG_BUY' && longAnalysis.recommendation !== 'AVOID') ||
    (longAnalysis.recommendation === 'STRONG_BUY' && shortAnalysis.recommendation !== 'AVOID');
  
  const confidence = Math.round(
    (shortAnalysis.probability * 0.6 + longAnalysis.probability * 0.4)
  );
  
  return {
    short: shortAnalysis,
    long: longAnalysis,
    aligned,
    confidence,
  };
}

/**
 * ENTRY CONDITION CHECKER - EVEN/ODD EDITION
 * Counts streak of EVEN digits, then enters ODD trade
 */
function checkEntryConditions(
  history,
  analysis,
  minStreak = 2,
  minProbability = 80,
  requireMultiTimeframe = true
) {
  // Calculate current streak of EVEN digits
  let streak = 0;
  for (let i = history.length - 1; i >= 0; i--) {
    if (isEven(history[i])) streak++;
    else break;
  }

  if (streak < minStreak) {
    return { canEnter: false, streak, reason: `Even Streak ${streak}/${minStreak}` };
  }

  if (analysis.probability < minProbability) {
    return { canEnter: false, streak, reason: `Prob ${analysis.probability}%/${minProbability}%` };
  }

  if (analysis.recommendation === 'AVOID') {
    return { canEnter: false, streak, reason: 'Analysis: AVOID' };
  }

  // Multi-timeframe check
  if (requireMultiTimeframe && history.length >= 50) {
    const mtf = analyzeMultiTimeframe(history);
    if (!mtf.aligned) {
      return { 
        canEnter: false, 
        streak, 
        reason: `MTF Divergence (S:${mtf.short.probability}% L:${mtf.long.probability}%)`,
        multiTimeframe: mtf
      };
    }
    return { canEnter: true, streak, reason: 'MTF ALIGNED', multiTimeframe: mtf };
  }

  return { canEnter: true, streak, reason: 'CONDITIONS MET' };
}

/**
 * MARTINGALE CALCULATOR
 */
function calculateNextStake(
  currentStake,
  multiplier,
  step,
  maxStep
) {
  // Always multiply the stake — even on the final recovery step the bot
  // fires at the escalated amount. shouldStop tells the caller whether to
  // keep the chain going after this trade or enter cooldown.
  const nextStake = parseFloat((currentStake * multiplier).toFixed(2));
  const shouldStop = (maxStep !== 999) && (step >= maxStep);
  return { stake: nextStake, shouldStop };
}

/**
 * LOG ENTRY TYPE
 */


function createLogEntry(
  type,
  title,
  message
) {
  return {
    id: crypto.randomUUID(),
    timestamp: new Date(),
    type,
    title,
    message,
  };
}

exports.MARKETS = MARKETS;
exports.isEven = isEven;
exports.isOdd = isOdd;
exports.analyzeDigits = analyzeDigits;
exports.calculateVolatility = calculateVolatility;
exports.getEmptyAnalysis = getEmptyAnalysis;
exports.findBestMarket = findBestMarket;
exports.calculateMarketScore = calculateMarketScore;
exports.analyzeMultiTimeframe = analyzeMultiTimeframe;
exports.checkEntryConditions = checkEntryConditions;
exports.calculateNextStake = calculateNextStake;
exports.createLogEntry = createLogEntry;
window.EvenTrading = exports;
})();


(function () {
  'use strict';
  function getWsUrl() { const id = (window.HubStore && window.HubStore.getState().wsAppId) || (function(){ try { return localStorage.getItem('hub_ws_app_id') || ''; } catch(_){ return ''; } })() || '1089'; return 'wss://ws.derivws.com/websockets/v3?app_id=' + id; }

  function isOdd(d) {
    return d % 2 !== 0;
  }

  class GlobalSocketManager {
    constructor() {
      this.socket = null;
      this.subscriptions = new Map();
      this.healthCallbacks = new Set();
      this.tickHistory = new Map();
      this.longTermHistory = new Map();
      this.marketHealth = new Map();
      this.reconnectAttempts = 0;
      this.maxReconnectAttempts = 10;
      this.isConnecting = false;
      this.pingInterval = null;
    }

    connect() {
      return new Promise((resolve) => {
        if (this.socket && this.socket.readyState === WebSocket.OPEN) {
          resolve();
          return;
        }
        if (this.isConnecting) {
          setTimeout(() => resolve(), 500);
          return;
        }
        this.isConnecting = true;
        this.socket = new WebSocket(getWsUrl());
        this.socket.onopen = () => {
          this.isConnecting = false;
          this.reconnectAttempts = 0;
          if (this.pingInterval) clearInterval(this.pingInterval);
          this.pingInterval = setInterval(() => {
            if (this.socket && this.socket.readyState === WebSocket.OPEN) {
              this.socket.send(JSON.stringify({ ping: 1 }));
            }
          }, 25000);
          this.subscriptions.forEach((_, symbol) => {
            if (this.socket) this.socket.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
          });
          resolve();
        };
        this.socket.onmessage = (msg) => {
          try {
            const data = JSON.parse(msg.data);
            if (data.msg_type === 'tick' && data.tick) {
              const symbol = data.tick.symbol;
              const quote = data.tick.quote;
              const quoteStr = quote.toFixed(2);
              const digit = parseInt(quoteStr[quoteStr.length - 1], 10);
              const tickData = { symbol, digit, quote, timestamp: Date.now() };
              this.updateHistory(symbol, digit);
              this.calculateHealth(symbol);
              const callbacks = this.subscriptions.get(symbol);
              if (callbacks) callbacks.forEach((cb) => cb(tickData));
            }
          } catch (e) {
            console.error('[GlobalSocket] Parse error:', e);
          }
        };
        this.socket.onerror = () => { this.isConnecting = false; };
        this.socket.onclose = () => {
          this.isConnecting = false;
          if (this.pingInterval) { clearInterval(this.pingInterval); this.pingInterval = null; }
          if (this.reconnectAttempts < this.maxReconnectAttempts) {
            this.reconnectAttempts++;
            const delay = Math.min(1000 * Math.pow(2, this.reconnectAttempts), 30000);
            setTimeout(() => this.connect(), delay);
          } else {
            // Reconnect budget exhausted — surface this instead of leaving
            // the tab silently showing stale tick data with no explanation.
            const el = document.getElementById('global-error-toast');
            if (el) {
              el.textContent = '⚠ Lost connection to the live market feed and could not reconnect after several attempts. Reload the page to restore live ticks.';
              el.classList.add('show');
              clearTimeout(el._hideTimer);
              el._hideTimer = setTimeout(() => el.classList.remove('show'), 10000);
            }
          }
        };
      });
    }

    updateHistory(symbol, digit) {
      let history = this.tickHistory.get(symbol);
      if (!history) { history = []; this.tickHistory.set(symbol, history); }
      history.push(digit);
      if (history.length > 200) history.shift();
      let longHistory = this.longTermHistory.get(symbol);
      if (!longHistory) { longHistory = []; this.longTermHistory.set(symbol, longHistory); }
      longHistory.push(digit);
      if (longHistory.length > 120) longHistory.shift();
    }

    calculateHealth(symbol) {
      const shortHistory = this.tickHistory.get(symbol) || [];
      const longHistory = this.longTermHistory.get(symbol) || [];
      if (shortHistory.length < 10 || longHistory.length < 20) return;
      const recentTicks = shortHistory.slice(-50);
      const shortTermOddRate = (recentTicks.filter((d) => isOdd(d)).length / recentTicks.length) * 100;
      const longTermOddRate = (longHistory.filter((d) => isOdd(d)).length / longHistory.length) * 100;
      const recent20 = longHistory.slice(-20);
      const previous40 = longHistory.slice(-60, -20);
      const recentOddRate = recent20.filter((d) => isOdd(d)).length / recent20.length;
      const previousOddRate = previous40.length > 0 ? previous40.filter((d) => isOdd(d)).length / previous40.length : 0.5;
      let trend = 'STABLE';
      if (recentOddRate - previousOddRate > 0.1) trend = 'UP';
      else if (recentOddRate - previousOddRate < -0.1) trend = 'DOWN';
      let changes = 0;
      for (let i = 1; i < recentTicks.length; i++) changes += Math.abs(recentTicks[i] - recentTicks[i - 1]);
      const avgChange = changes / (recentTicks.length - 1);
      let volatility = 'LOW';
      if (avgChange > 4) volatility = 'HIGH';
      else if (avgChange > 2.5) volatility = 'MEDIUM';
      let longTermScore = 0;
      if (longTermOddRate >= 45 && longTermOddRate <= 65) longTermScore += 40;
      else if (longTermOddRate >= 40) longTermScore += 25;
      else longTermScore += 10;
      if (trend === 'UP') longTermScore += 30;
      else if (trend === 'STABLE') longTermScore += 15;
      if (volatility === 'LOW') longTermScore += 30;
      else if (volatility === 'MEDIUM') longTermScore += 15;
      let longTerm = 'POOR';
      if (longTermScore >= 70) longTerm = 'HEALTHY';
      else if (longTermScore >= 45) longTerm = 'MODERATE';
      const health = {
        shortTerm: Math.round(shortTermOddRate),
        longTerm,
        longTermScore: Math.round(longTermScore),
        oddRate: Math.round(longTermOddRate),
        trend,
        volatility,
        lastUpdate: Date.now(),
      };
      this.marketHealth.set(symbol, health);
      this.healthCallbacks.forEach((cb) => cb(symbol, health));
    }

    subscribe(symbol, callback) {
      if (!this.subscriptions.has(symbol)) {
        this.subscriptions.set(symbol, new Set());
        if (this.socket && this.socket.readyState === WebSocket.OPEN) {
          this.socket.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
        }
      }
      this.subscriptions.get(symbol).add(callback);
      return () => {
        const callbacks = this.subscriptions.get(symbol);
        if (callbacks) {
          callbacks.delete(callback);
          if (callbacks.size === 0) this.subscriptions.delete(symbol);
        }
      };
    }

    onHealthUpdate(callback) {
      this.healthCallbacks.add(callback);
      return () => this.healthCallbacks.delete(callback);
    }

    getHistory(symbol) { return this.tickHistory.get(symbol) || []; }
    getHealth(symbol) { return this.marketHealth.get(symbol) || null; }
    getAllHealth() { return new Map(this.marketHealth); }

    disconnect() {
      if (this.pingInterval) { clearInterval(this.pingInterval); this.pingInterval = null; }
      if (this.socket) this.socket.close();
      this.socket = null;
      this.subscriptions.clear();
      this.healthCallbacks.clear();
    }
  }

  window.EvenSocket = { globalSocket: new GlobalSocketManager() };
})();


(function () {
  'use strict';
  function createMarketScanner(Trading, Socket, ns) {
    const { analyzeDigits, MARKETS } = Trading;
    const { globalSocket } = Socket;

    class MarketScanner {
      constructor(onUpdate) {
        this.onUpdate = onUpdate;
        this.marketData = new Map();
        this.unsubscribes = [];
        this.tickPeriod = 50;
        MARKETS.forEach((m) => {
          this.marketData.set(m.symbol, {
            symbol: m.symbol,
            name: m.name,
            history: [],
            analysis: null,
            health: null,
            score: 0,
            isGolden: false,
          });
        });
      }

      setTickPeriod(period) { this.tickPeriod = period; }

      async start() {
        await globalSocket.connect();

          const unsub = globalSocket.subscribe(market.symbol, (data) => {
            this.updateMarket(market.symbol, data.digit);
          });
          this.unsubscribes.push(unsub);
        });
        const healthUnsub = globalSocket.onHealthUpdate((symbol, health) => {
          const market = this.marketData.get(symbol);
          if (market) {
            market.health = health;
            this.marketData.set(symbol, market);
          }
        });
        this.unsubscribes.push(healthUnsub);

      updateMarket(symbol, digit) {

        const history = globalSocket.getHistory(symbol);
        market.history = history.slice(-this.tickPeriod);
        market.health = globalSocket.getHealth(symbol);
        if (market.history.length >= 10) {
          market.analysis = analyzeDigits(market.history, this.tickPeriod);
          market.score = this.calculateScore(market);
          market.isGolden = market.health && market.health.longTerm === 'HEALTHY' &&
            market.analysis.probability >= 75 && market.analysis.recommendation !== 'AVOID';
        }
        this.marketData.set(symbol, market);
        this.notifyUpdate();
      }

      calculateScore(market) {
        const analysis = market.analysis;
        const health = market.health;
        if (!analysis) return 0;
        let score = analysis.probability;
        if (health) {
          if (health.longTerm === 'HEALTHY') score += 25;
          else if (health.longTerm === 'MODERATE') score += 10;
          if (health.trend === 'UP') score += 15;
          else if (health.trend === 'STABLE') score += 5;
          if (health.volatility === 'LOW') score += 10;
          else if (health.volatility === 'MEDIUM') score += 5;
        }
        if (analysis.trendScore > 60) score += 10;
        if (analysis.momentumScore > 60) score += 10;
        if (analysis.conditions.rareDigits) score += 5;
        if (analysis.conditions.dominantOdd) score += 5;
        return Math.min(100, Math.round(score));
      }

      notifyUpdate() {
        const markets = Array.from(this.marketData.values());
        const sorted = [...markets].sort((a, b) => b.score - a.score);
        // Normalise displayed scores relative to the top scorer so markets
        // don't all appear pinned at 100%.
        const maxScore = sorted[0] ? sorted[0].score : 1;
        const normalised = sorted.map((m, i) => ({
          ...m,
          score: maxScore > 0 ? Math.max(0, Math.min(100, Math.round((m.score / maxScore) * 100) - (i * 4))) : 0,
        }));
        this.onUpdate({
          markets,
          bestMarket: sorted[0] || null,
          topThree: normalised.slice(0, 3),
          isScanning: true,
          lastUpdate: Date.now(),
        });
      }

      stop() {
        this.unsubscribes.forEach((u) => u());
        this.unsubscribes = [];
      }

      getBestMarket() {
        return Array.from(this.marketData.values()).sort((a, b) => b.score - a.score)[0] || null;
      }

      getGoldenMarkets() {
        return Array.from(this.marketData.values()).filter((m) => m.isGolden).sort((a, b) => b.score - a.score);
      }
    }

    window[ns] = { MarketScanner };
  }

  createMarketScanner(window.EvenTrading, window.EvenSocket, 'EvenScanner');
})();
